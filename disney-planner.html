<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Disney Trip Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a1a;--card:#141428;--card2:#1a1a35;--border:#2a2a4a;
  --text:#e8e8f0;--text2:#9898b0;--accent:#6c5ce7;--accent2:#a29bfe;
  --gold:#ffd700;--green:#00cec9;--red:#ff6b6b;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#1a1a35,#0a0a1a);border-bottom:1px solid var(--border);padding:12px 16px;backdrop-filter:blur(10px)}
.header h1{font-size:20px;text-align:center;background:linear-gradient(135deg,var(--gold),#ff9f43,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header .subtitle{text-align:center;font-size:11px;color:var(--text2);margin-top:2px}
.next-up{background:linear-gradient(135deg,#2d1b69,#1a1a35);border:1px solid var(--accent);border-radius:12px;margin:10px 16px;padding:14px 16px;position:relative;overflow:hidden}
.next-up::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(108,92,231,0.1),transparent 60%);animation:pulse-bg 3s ease-in-out infinite}
@keyframes pulse-bg{0%,100%{opacity:0.5}50%{opacity:1}}
.next-up-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);font-weight:700}
.next-up-name{font-size:18px;font-weight:700;margin-top:4px;color:var(--gold)}
.next-up-land{font-size:13px;color:var(--text2);margin-top:2px}
.next-up.done{border-color:var(--green)}
.next-up.done .next-up-name{color:var(--green)}
.tabs{display:flex;gap:8px;padding:12px 16px 0}
.tab{flex:1;padding:10px;border:none;border-radius:10px 10px 0 0;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;background:var(--card);color:var(--text2)}
.tab.active{background:var(--accent);color:#fff}
.day-tabs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.day-tab{padding:8px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--text2);transition:all .2s}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.meal-tabs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.meal-tab{padding:8px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--text2);transition:all .2s}
.meal-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.progress-wrap{padding:8px 16px}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s ease}
.progress-text{font-size:11px;color:var(--text2);margin-top:4px;text-align:right}
.list{padding:8px 16px 120px}
.item{display:flex;align-items:center;gap:12px;padding:14px 12px;margin:4px 0;border-radius:10px;background:var(--card);border:1px solid transparent;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}
.item:active{transform:scale(0.98)}
.item.next{border-color:var(--gold);background:linear-gradient(135deg,rgba(255,215,0,0.08),var(--card))}
.item.checked{opacity:0.45}
.item.checked .item-name{text-decoration:line-through}
.checkbox{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:16px}
.item.checked .checkbox{background:var(--green);border-color:var(--green)}
.land-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600}
.item-land{font-size:11px;color:var(--text2);margin-top:2px}
.item-desc{font-size:11px;color:var(--text2);margin-top:1px;font-style:italic}
.map-container{margin:10px 16px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#0d0d20;position:relative}
canvas{width:100%;display:block}
.section-hidden{display:none}

@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 4px var(--gold))}50%{filter:drop-shadow(0 0 12px var(--gold))}}
</style>
</head>
<body>

<div class="header">
  <h1>Disneyland Trip Planner</h1>
  <div class="subtitle">3-Day Family Adventure</div>
</div>

<div class="next-up" id="nextUp">
  <div class="next-up-label">Next Up</div>
  <div class="next-up-name" id="nextUpName">Loading...</div>
  <div class="next-up-land" id="nextUpLand"></div>
</div>

<div class="map-container">
  <canvas id="map"></canvas>
</div>

<div class="tabs">
  <button class="tab active" data-tab="rides" onclick="switchTab('rides')">Rides</button>
  <button class="tab" data-tab="restaurants" onclick="switchTab('restaurants')">Restaurants</button>
</div>

<div id="ridesSection">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div class="list" id="ridesList"></div>
</div>

<div id="restaurantsSection" class="section-hidden">
  <div class="meal-tabs" id="mealTabs"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="restProgressFill"></div></div>
    <div class="progress-text" id="restProgressText"></div>
  </div>
  <div class="list" id="restList"></div>
</div>

let currentTab = 'rides';
let currentDay = Object.keys(RIDES)[0];
let currentMeal = Object.keys(RESTAURANTS)[0];
let checkedState = {};
let nextUpItem = null;
let highlightedLand = null;
let highlightedName = null;
let highlightTimer = 0;
let animFrame = 0;

// Load state
try { checkedState = JSON.parse(localStorage.getItem('disneyPlanner') || '{}'); } catch(e){}

function saveState() {
  localStorage.setItem('disneyPlanner', JSON.stringify(checkedState));
}

function getKey(section, group, idx) {
  return `${section}|${group}|${idx}`;
}

function isChecked(key) {
  return !!checkedState[key];
}

function toggleCheck(key) {
  checkedState[key] = !checkedState[key];
  saveState();
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('ridesSection').classList.toggle('section-hidden', tab !== 'rides');
  document.getElementById('restaurantsSection').classList.toggle('section-hidden', tab !== 'restaurants');
  render();
}

function switchDay(day) {
  currentDay = day;
  render();
}

function switchMeal(meal) {
  currentMeal = meal;
  render();
}

function findNextUp() {
  if (currentTab === 'rides') {
    const items = RIDES[currentDay];
    for (let i = 0; i < items.length; i++) {
      if (!isChecked(getKey('rides', currentDay, i))) return {item: items[i], section: 'rides', group: currentDay, idx: i};
    }
  } else {
    const items = RESTAURANTS[currentMeal];
    for (let i = 0; i < items.length; i++) {
      if (items[i].header) continue;
      if (!isChecked(getKey('rest', currentMeal, i))) return {item: items[i], section: 'rest', group: currentMeal, idx: i};
    }
  }
  return null;
}

function render() {
  renderDayTabs();
  renderMealTabs();
  renderList();
  updateNextUp();
  drawMap();
}

function renderDayTabs() {
  const c = document.getElementById('dayTabs');
  c.innerHTML = '';
  Object.keys(RIDES).forEach(day => {
    const b = document.createElement('button');
    b.className = 'day-tab' + (day === currentDay ? ' active' : '');
    b.textContent = day.startsWith('Bonus') ? 'Bonus' : day.split(' — ')[0];
    b.onclick = () => switchDay(day);
    c.appendChild(b);
  });
}

function renderMealTabs() {
  const c = document.getElementById('mealTabs');
  c.innerHTML = '';
  Object.keys(RESTAURANTS).forEach(meal => {
    const b = document.createElement('button');
    b.className = 'meal-tab' + (meal === currentMeal ? ' active' : '');
    b.textContent = meal;
    b.onclick = () => switchMeal(meal);
    c.appendChild(b);
  });
}

function renderList() {
  if (currentTab === 'rides') {
    const items = RIDES[currentDay];
    const list = document.getElementById('ridesList');
    const next = findNextUp();
    let done = 0;
    list.innerHTML = '';
    let sectionNum = 0;
    let lastSection = null;
    items.forEach((item, i) => {
      // Insert subheaders for Bonus day
      if (item.section && item.section !== lastSection) {
        lastSection = item.section;
        sectionNum = 0;
        const hdr = document.createElement('div');
        hdr.style.cssText = 'padding:12px 4px 6px;font-size:15px;font-weight:700;color:var(--accent2);border-bottom:1px solid var(--border);margin-top:8px;';
        hdr.textContent = item.section;
        list.appendChild(hdr);
      }
      sectionNum++;
      const key = getKey('rides', currentDay, i);
      const checked = isChecked(key);
      if (checked) done++;
      const isNext = next && next.idx === i && next.group === currentDay;
      const displayNum = item.section ? sectionNum : i + 1;
      const div = document.createElement('div');
      div.className = 'item' + (checked ? ' checked' : '') + (isNext ? ' next' : '');
      div.innerHTML = `
        <div class="checkbox">${checked ? '&#10003;' : ''}</div>
        <div class="land-dot" style="background:${LAND_COLORS[item.land] || '#666'}"></div>
        <div class="item-info">
          <div class="item-name">${displayNum}. ${item.name}</div>
          <div class="item-land">${item.land}</div>
        </div>
      `;
      div.onclick = () => toggleCheck(key);
      list.appendChild(div);
    });
    const pct = items.length ? Math.round(done / items.length * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done}/${items.length} complete (${pct}%)`;
  } else {
    const items = RESTAURANTS[currentMeal];
    const list = document.getElementById('restList');
    const next = findNextUp();
    let done = 0;
    list.innerHTML = '';
    items.forEach((item, i) => {
      // Header items (meal labels)
      if (item.header) {
        const hdr = document.createElement('div');
        hdr.style.cssText = 'padding:10px 4px 4px;font-size:14px;font-weight:700;color:#ffd600;margin-top:12px;border-bottom:1px solid rgba(255,214,0,0.15);';
        hdr.textContent = item.name;
        list.appendChild(hdr);
        return;
      }
      const key = getKey('rest', currentMeal, i);
      const checked = isChecked(key);
      if (checked) done++;
      const isNext = next && next.idx === i && next.group === currentMeal;
      const div = document.createElement('div');
      div.className = 'item' + (checked ? ' checked' : '') + (isNext ? ' next' : '');
      div.innerHTML = `
        <div class="checkbox">${checked ? '&#10003;' : ''}</div>
        <div class="land-dot" style="background:${LAND_COLORS[item.land] || '#666'}"></div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-land">${item.land}</div>
          ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        </div>
      `;
      div.onclick = () => {
        toggleCheck(key);
        highlightedLand = item.land;
        highlightedName = item.name;
        highlightTimer = 180;
        drawMap();
        document.getElementById('mapCanvas').scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      list.appendChild(div);
    });
    const pct = items.length ? Math.round(done / items.length * 100) : 0;
    document.getElementById('restProgressFill').style.width = pct + '%';
    document.getElementById('restProgressText').textContent = `${done}/${items.length} complete (${pct}%)`;
  }
}

function updateNextUp() {
  const next = findNextUp();
  nextUpItem = next;
  const el = document.getElementById('nextUp');
  const nameEl = document.getElementById('nextUpName');
  const landEl = document.getElementById('nextUpLand');
  if (next) {
    el.classList.remove('done');
    nameEl.textContent = next.item.name;
    landEl.textContent = next.item.land;
  } else {
    el.classList.add('done');
    nameEl.textContent = 'All Done!';
    landEl.textContent = currentTab === 'rides' ? 'Great job today!' : 'You tried everything!';
  }
}

// Map drawing
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = rect.width;
  H = Math.round(W * 0.7);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawLandShape(cx, cy, rx, ry, color, name, isHighlight) {
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx);
  g.addColorStop(0, color + '55');
  g.addColorStop(1, color + '22');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = color + '88';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Label
  ctx.fillStyle = color + 'cc';
  ctx.font = `bold ${Math.max(8, W * 0.018)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Word wrap for long names
  const words = name.split(' ');
  if (name.length > 12 && words.length > 1) {
    const mid = Math.ceil(words.length / 2);
    const line1 = words.slice(0, mid).join(' ');
    const line2 = words.slice(mid).join(' ');
    const fs = Math.max(8, W * 0.018);
    ctx.fillText(line1, cx, cy - fs * 0.55);
    ctx.fillText(line2, cx, cy + fs * 0.55);
  } else {
    ctx.fillText(name, cx, cy);
  }
  ctx.restore();
}

function drawMap() {
  resizeCanvas();
  ctx.clearRect(0, 0, W, H);

  // Background with subtle texture
  const bgG = ctx.createLinearGradient(0, 0, 0, H);
  bgG.addColorStop(0, '#0d1020');
  bgG.addColorStop(1, '#0a0a18');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Park outlines with glow
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(W * 0.01, H * 0.04, W * 0.46, H * 0.92, 14);
  ctx.strokeStyle = '#4466aa44';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#4466aa';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff05';
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.roundRect(W * 0.50, H * 0.04, W * 0.48, H * 0.92, 14);
  ctx.strokeStyle = '#aa664444';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#aa6644';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff05';
  ctx.fill();
  ctx.restore();

  // Park title banners
  ctx.save();
  // Disneyland banner
  const dlBannerW = W * 0.32;
  const dlBannerX = W * 0.24 - dlBannerW / 2;
  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.roundRect(dlBannerX, H * 0.04 - 2, dlBannerW, Math.max(18, H * 0.05), 8);
  ctx.fill();
  ctx.strokeStyle = '#4466aa66';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.font = `bold ${Math.max(10, W * 0.022)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#8899cc';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏰 Disneyland Park', W * 0.24, H * 0.04 + Math.max(9, H * 0.025));

  // DCA banner
  const dcaBannerW = W * 0.34;
  const dcaBannerX = W * 0.74 - dcaBannerW / 2;
  ctx.fillStyle = '#2a1a1a';
  ctx.beginPath();
  ctx.roundRect(dcaBannerX, H * 0.04 - 2, dcaBannerW, Math.max(18, H * 0.05), 8);
  ctx.fill();
  ctx.strokeStyle = '#aa664466';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#cc9977';
  ctx.fillText('🎡 California Adventure', W * 0.74, H * 0.04 + Math.max(9, H * 0.025));
  ctx.restore();

  // Draw paths connecting lands
  ctx.save();
  ctx.strokeStyle = '#ffffff15';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  // Disneyland paths
  const paths = [
    ["Main Street", "Adventureland"], ["Main Street", "Tomorrowland"], ["Main Street", "Fantasyland"],
    ["Adventureland", "New Orleans Square"], ["New Orleans Square", "Critter Country"],
    ["Critter Country", "Galaxy's Edge"], ["Adventureland", "Frontierland"],
    ["Frontierland", "Fantasyland"], ["Fantasyland", "Mickey's Toontown"],
    ["Fantasyland", "Tomorrowland"],
    // DCA paths
    ["Buena Vista Street", "Hollywood Land"], ["Hollywood Land", "Avengers Campus"],
    ["Avengers Campus", "Cars Land"], ["Buena Vista Street", "Grizzly Peak"],
    ["Grizzly Peak", "Paradise Gardens"], ["Paradise Gardens", "Pixar Pier"],
    ["Cars Land", "Grizzly Peak"],
  ];
  for (const [a, b] of paths) {
    const pa = LAND_POS[a], pb = LAND_POS[b];
    if (pa && pb) {
      ctx.beginPath();
      ctx.moveTo(pa[0] * W, pa[1] * H);
      ctx.lineTo(pb[0] * W, pb[1] * H);
      ctx.stroke();
    }
  }
  ctx.setLineDash([]);
  ctx.restore();

  // Entrance markers
  ctx.save();
  ctx.fillStyle = '#ffd700';
  ctx.font = `${Math.max(10, W * 0.02)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('⬆ Entrance', W * 0.22, H * 0.95);
  ctx.fillText('⬆ Entrance', W * 0.58, H * 0.95);
  ctx.restore();

  // Draw lands with better shapes
  const rx = W * 0.065;
  const ry = H * 0.075;
  for (const [name, pos] of Object.entries(LAND_POS)) {
    const cx = pos[0] * W;
    const cy = pos[1] * H;
    const color = LAND_COLORS[name] || '#666';
    drawLandShape(cx, cy, rx, ry, color, name, false);

    // Small icon for each land
    ctx.save();
    ctx.font = `${Math.max(10, W * 0.025)}px sans-serif`;
    ctx.textAlign = 'center';
    const icons = {
      "Main Street": "🏠", "Adventureland": "🌴", "New Orleans Square": "🎺",
      "Critter Country": "🦝", "Galaxy's Edge": "⭐", "Frontierland": "🤠",
      "Fantasyland": "🏰", "Mickey's Toontown": "🐭", "Tomorrowland": "🚀",
      "Buena Vista Street": "🎬", "Hollywood Land": "🎭", "Avengers Campus": "🦸",
      "Cars Land": "🏎️", "Grizzly Peak": "🐻", "Paradise Gardens": "🌊", "Pixar Pier": "🎡"
    };
    if (icons[name]) ctx.fillText(icons[name], cx, cy - ry * 0.6);
    ctx.restore();
  }

  // Draw "Next Up" marker
  if (nextUpItem) {
    const land = nextUpItem.item.land;
    const pos = LAND_POS[land];
    if (pos) {
      const cx = pos[0] * W;
      const cy = pos[1] * H;
      const t = Date.now() / 1000;
      const pulse = 0.5 + 0.5 * Math.sin(t * 3);

      // Glow
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, rx * (1.1 + pulse * 0.3), 0, Math.PI * 2);
      const glowG = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx * 1.5);
      glowG.addColorStop(0, `rgba(255,215,0,${0.25 + pulse * 0.15})`);
      glowG.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = glowG;
      ctx.fill();
      ctx.restore();

      // Pin
      ctx.save();
      const pinY = cy - ry - 8;
      ctx.beginPath();
      ctx.arc(cx, pinY - 10, 7 + pulse * 2, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 10 + pulse * 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Pin stem
      ctx.beginPath();
      ctx.moveTo(cx, pinY - 3);
      ctx.lineTo(cx, pinY + 8);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      // Name label above pin
      ctx.save();
      ctx.font = `bold ${Math.max(9, W * 0.02)}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 4;
      ctx.fillText(nextUpItem.item.name, cx, pinY - 22);
      ctx.restore();
    }
  }

  // Restaurant highlight
  drawRestaurantHighlight();
}

// Entrance arrows
function drawEntrance() {
  // Small entrance indicator
  ctx.save();
  ctx.font = `${Math.max(8, W * 0.015)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffffff55';
  ctx.textAlign = 'center';
  ctx.fillText('Entrance', W * 0.22, H * 0.96);
  ctx.fillText('Entrance', W * 0.58, H * 0.96);
  // Arrows
  ctx.beginPath();
  ctx.moveTo(W * 0.22, H * 0.93);
  ctx.lineTo(W * 0.22 - 5, H * 0.90);
  ctx.moveTo(W * 0.22, H * 0.93);
  ctx.lineTo(W * 0.22 + 5, H * 0.90);
  ctx.moveTo(W * 0.58, H * 0.93);
  ctx.lineTo(W * 0.58 - 5, H * 0.90);
  ctx.moveTo(W * 0.58, H * 0.93);
  ctx.lineTo(W * 0.58 + 5, H * 0.90);
  ctx.strokeStyle = '#ffffff44';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

// Draw restaurant highlight on map
function drawRestaurantHighlight() {
  if (!highlightedLand || highlightTimer <= 0) return;
  const pos = LAND_POS[highlightedLand];
  if (!pos) return;

  const cx = pos[0] * W;
  const cy = pos[1] * H;
  const t = Date.now() / 1000;
  const pulse = 0.5 + 0.5 * Math.sin(t * 4);
  const rx2 = W * 0.065;

  // Big pulsing ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, rx2 * (1.3 + pulse * 0.4), 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,100,50,${0.4 + pulse * 0.3})`;
  ctx.lineWidth = 3;
  ctx.shadowColor = '#ff6432';
  ctx.shadowBlur = 15 + pulse * 10;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Label banner
  ctx.save();
  ctx.font = `bold ${Math.max(9, W * 0.02)}px -apple-system, sans-serif`;
  const textW = ctx.measureText(highlightedName).width + 16;
  const bannerY = cy - rx2 * 1.8;
  ctx.fillStyle = 'rgba(255,100,50,0.9)';
  ctx.beginPath();
  ctx.roundRect(cx - textW / 2, bannerY - 10, textW, 20, 6);
  ctx.fill();
  // Arrow pointing down
  ctx.beginPath();
  ctx.moveTo(cx - 6, bannerY + 10);
  ctx.lineTo(cx, bannerY + 18);
  ctx.lineTo(cx + 6, bannerY + 10);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(highlightedName, cx, bannerY);
  ctx.restore();

  highlightTimer--;
  if (highlightTimer <= 0) {
    highlightedLand = null;
    highlightedName = null;
  }
}

// Animation loop for glowing marker
function animate() {
  animFrame = requestAnimationFrame(animate);
  if (nextUpItem || highlightTimer > 0) drawMap();
}

// Init
window.addEventListener('resize', () => { drawMap(); });
render();
animate();

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r,r,r,r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}
