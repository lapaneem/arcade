<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KTBM - Tap the Drones!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#mute-btn {
  position: fixed;
  bottom: 12px;
  right: 12px;
  z-index: 100;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(100,180,255,0.6);
  color: #fff;
  font-size: 22px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#mute-btn:hover { background: rgba(100,180,255,0.3); }
#back-btn {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(100,180,255,0.6);
  color: #7bf;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  text-decoration: none;
  backdrop-filter: blur(4px);
}
#back-btn:hover { background: rgba(100,180,255,0.3); }
#music-container {
  position: fixed;
  bottom: 60px;
  right: 10px;
  z-index: 100;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(79,195,247,0.5);
}
</style>
</head>
<body>
<canvas id="c" style="display:none;"></canvas>
<button id="mute-btn">&#x1f50a;</button>
<a id="back-btn" href="../index.html">Back</a>
<div id="music-container" style="display:none;"></div>

<div id="start-overlay" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a1628;z-index:50;">
  <h1 style="font-size:60px;color:#4fc3f7;text-shadow:0 0 30px rgba(79,195,247,0.6);margin-bottom:8px;direction:rtl;">כטב"ם</h1>
  <p style="color:rgba(255,255,255,0.6);font-size:18px;margin-bottom:6px;direction:rtl;">?מה זה בשמיים</p>
  <p style="color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:24px;">Tap only the drones!</p>
  <button id="play-btn" style="padding:14px 48px;font-size:20px;font-weight:700;border:2px solid #4fc3f7;background:rgba(79,195,247,0.15);color:#4fc3f7;border-radius:30px;cursor:pointer;letter-spacing:2px;pointer-events:auto;position:relative;z-index:60;">PLAY</button>
</div>

<div id="gameover-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:#0a1628;z-index:200;">
  <h1 style="font-size:40px;color:#ff5252;text-shadow:0 0 20px rgba(255,82,82,0.5);margin-bottom:16px;">Game Over</h1>
  <div id="go-stats" style="font-size:20px;color:rgba(255,255,255,0.8);text-align:center;line-height:2;margin-bottom:24px;"></div>
  <button id="retry-btn" style="padding:14px 48px;font-size:20px;font-weight:700;border:2px solid #4fc3f7;background:rgba(79,195,247,0.15);color:#4fc3f7;border-radius:30px;cursor:pointer;letter-spacing:2px;pointer-events:auto;position:relative;z-index:210;">PLAY AGAIN</button>
</div>

<script>
// Music
let musicStarted = false;
let musicHidden = false;
const musicContainer = document.getElementById('music-container');
const muteBtn = document.getElementById('mute-btn');

function startMusic() {
  if (musicStarted) return;
  musicContainer.innerHTML = '<iframe width="200" height="50" src="https://www.youtube.com/embed/yoe_f-YYHnQ?autoplay=1&loop=1&playlist=yoe_f-YYHnQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
  musicContainer.style.display = 'block';
  musicStarted = true;
}

muteBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (!musicStarted) return;
  musicHidden = !musicHidden;
  musicContainer.style.display = musicHidden ? 'none' : 'block';
  muteBtn.innerHTML = musicHidden ? '&#x1f507;' : '&#x1f50a;';
});

// Canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initBuildings();
}
resize();
window.addEventListener('resize', resize);

// Game state
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let lives = 5;
let combo = 0;
let comboTimer = 0;
let comboMultiplier = 1;
let gameTime = 0;
let spawnInterval = 90;
let spawnTimer = 0;
let difficulty = 1;
let bestScore = parseInt(localStorage.getItem('ktbm_tap_best') || '0');
let flyingObjects = [];
let particles = [];
let flashTexts = [];
let screenFlash = 0;
let screenFlashColor = '';
let screenShake = 0;
let clouds = [];
let buildings = [];

// Cloud init
function initClouds() {
  clouds = [];
  for (let i = 0; i < 12; i++) {
    clouds.push({
      x: Math.random() * W * 1.5,
      y: 30 + Math.random() * (H * 0.5),
      w: 80 + Math.random() * 160,
      h: 25 + Math.random() * 35,
      speed: 0.2 + Math.random() * 0.6,
      a: 0.08 + Math.random() * 0.15
    });
  }
}

// City silhouette
function initBuildings() {
  buildings = [];
  let x = 0;
  while (x < W + 100) {
    const w = 30 + Math.random() * 60;
    const h = 40 + Math.random() * 120;
    buildings.push({ x, w, h, windows: [] });
    const b = buildings[buildings.length - 1];
    for (let wy = H - h + 10; wy < H - 10; wy += 18) {
      for (let wx = 5; wx < w - 5; wx += 14) {
        b.windows.push({ rx: wx, ry: wy - (H - h), lit: Math.random() > 0.4 });
      }
    }
    x += w + Math.random() * 15;
  }
}

initClouds();
initBuildings();

// Flying object types
const OBJ_DRONE = 'drone';
const OBJ_BIRD = 'bird';
const OBJ_AIRPLANE = 'airplane';

function spawnObject() {
  // Weight: more drones than others, but still plenty of distractors
  const r = Math.random();
  let type;
  if (r < 0.45) type = OBJ_DRONE;
  else if (r < 0.75) type = OBJ_BIRD;
  else type = OBJ_AIRPLANE;

  const baseSpeed = 1.5 + difficulty * 0.4;
  const speedVar = Math.random() * difficulty * 0.5;

  // Size scaling: at higher difficulty, drones get smaller
  const sizeScale = Math.max(0.55, 1 - difficulty * 0.04);

  const obj = {
    type,
    x: W + 60,
    y: 60 + Math.random() * (H - 200),
    speed: baseSpeed + speedVar + (type === OBJ_AIRPLANE ? -0.5 : 0),
    alive: true,
    tapped: false,
    rotorAngle: Math.random() * Math.PI * 2,
    wingPhase: Math.random() * Math.PI * 2,
    vy: (Math.random() - 0.5) * 1.2,
    scale: type === OBJ_AIRPLANE ? 1.3 : (type === OBJ_DRONE ? sizeScale : 0.9 + Math.random() * 0.2),
    opacity: 1
  };

  // Airplanes are bigger and steadier
  if (type === OBJ_AIRPLANE) {
    obj.vy *= 0.3;
    obj.speed = baseSpeed * 0.7 + speedVar * 0.3;
  }

  flyingObjects.push(obj);
}

// Hit detection
function hitTest(obj, mx, my) {
  let hitR;
  if (obj.type === OBJ_DRONE) hitR = 28 * obj.scale;
  else if (obj.type === OBJ_BIRD) hitR = 22 * obj.scale;
  else hitR = 45 * obj.scale;

  const dx = mx - obj.x;
  const dy = my - obj.y;
  return dx * dx + dy * dy < hitR * hitR;
}

// Handle tap/click
function handleTap(mx, my) {
  if (state !== STATE.PLAYING) return;
  if (state !== STATE.PLAYING) return;

  // Check objects from front (last drawn) to back
  let hitSomething = false;
  for (let i = flyingObjects.length - 1; i >= 0; i--) {
    const obj = flyingObjects[i];
    if (!obj.alive || obj.tapped) continue;
    if (hitTest(obj, mx, my)) {
      hitSomething = true;
      obj.tapped = true;

      if (obj.type === OBJ_DRONE) {
        // Correct! Destroy drone
        obj.alive = false;
        combo++;
        comboTimer = 90;
        comboMultiplier = Math.min(combo, 5);
        const points = 10 * comboMultiplier;
        score += points;

        // Explosion particles
        for (let j = 0; j < 18; j++) {
          const angle = (j / 18) * Math.PI * 2;
          const spd = 2 + Math.random() * 5;
          particles.push({
            x: obj.x, y: obj.y,
            vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            r: 2 + Math.random() * 4, life: 1, decay: 0.015 + Math.random() * 0.02,
            color: ['#ff6622', '#ffaa33', '#ffdd44', '#ff4411', '#88ccff'][Math.floor(Math.random() * 5)]
          });
        }
        // Smoke
        for (let j = 0; j < 6; j++) {
          particles.push({
            x: obj.x + (Math.random() - 0.5) * 20,
            y: obj.y + (Math.random() - 0.5) * 20,
            vx: (Math.random() - 0.5) * 1.5, vy: -1 - Math.random() * 2,
            r: 5 + Math.random() * 8, life: 0.8, decay: 0.01,
            color: 'rgba(100,100,100,0.6)'
          });
        }

        // Flash text
        const txt = comboMultiplier > 1 ? `!${'\u05DB\u05D8\u05D1"\u05DD'} x${comboMultiplier}` : '!\u05DB\u05D8\u05D1"\u05DD';
        addFlash(txt, obj.x, obj.y - 30, '#44ffaa', 32 + comboMultiplier * 4);
        if (points > 10) addFlash(`+${points}`, obj.x, obj.y + 20, '#ffdd44', 22);
        else addFlash('+10', obj.x, obj.y + 20, '#ffdd44', 20);

        screenFlash = 0.15;
        screenFlashColor = 'rgba(100,255,150,';

      } else {
        // Wrong! Bird or airplane
        combo = 0;
        comboMultiplier = 1;
        comboTimer = 0;
        lives--;

        screenFlash = 0.5;
        screenFlashColor = 'rgba(255,0,0,';
        screenShake = 12;

        // Red particles
        for (let j = 0; j < 8; j++) {
          particles.push({
            x: obj.x, y: obj.y,
            vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
            r: 3 + Math.random() * 3, life: 1, decay: 0.03,
            color: '#ff2222'
          });
        }

        addFlash('!\u05DC\u05D0 \u05DB\u05D8\u05D1"\u05DD', obj.x, obj.y - 30, '#ff4444', 36);

        if (lives <= 0) {
          gameOver();
        }
      }
      break; // Only hit one object per tap
    }
  }
}

// Input
canvas.addEventListener('click', e => {
  handleTap(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
});

document.getElementById('play-btn').addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
document.getElementById('play-btn').addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); startGame(); });
document.getElementById('retry-btn').addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
document.getElementById('retry-btn').addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); startGame(); });

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('gameover-overlay').style.display = 'none';
  canvas.style.display = 'block';
  startMusic();
  state = STATE.PLAYING;
  score = 0;
  lives = 5;
  combo = 0;
  comboTimer = 0;
  comboMultiplier = 1;
  gameTime = 0;
  difficulty = 1;
  spawnTimer = 0;
  spawnInterval = 90;
  flyingObjects = [];
  particles = [];
  flashTexts = [];
  screenFlash = 0;
  screenShake = 0;
  initClouds();
}

function gameOver() {
  state = STATE.GAMEOVER;
  canvas.style.display = 'none';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('ktbm_tap_best', bestScore.toString());
  }
  const stats = document.getElementById('go-stats');
  stats.innerHTML = 'Score: <span style="color:#4fc3f7;font-weight:bold;">' + score + '</span><br>Best: <span style="color:#ffd600;font-weight:bold;">' + bestScore + '</span>';
  document.getElementById('gameover-overlay').style.display = 'flex';
}

function addFlash(text, x, y, color, size) {
  flashTexts.push({ text, x, y, color: color || '#ffdd44', size: size || 30, life: 1 });
}

// ===== DRAWING =====

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a3a6e');
  g.addColorStop(0.3, '#3a6aae');
  g.addColorStop(0.6, '#5a9ade');
  g.addColorStop(0.85, '#8ac4f8');
  g.addColorStop(1, '#4a7ab8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawCloud(c) {
  ctx.fillStyle = `rgba(230,240,255,${c.a})`;
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x - c.w * 0.28, c.y + 4, c.w * 0.32, c.h * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x + c.w * 0.25, c.y + 3, c.w * 0.28, c.h * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawCitySilhouette() {
  const groundY = H - 50;
  // Dark ground
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, groundY, W, 50);

  // Buildings
  for (const b of buildings) {
    const by = groundY - b.h;
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(b.x, by, b.w, b.h + 2);
    // Windows
    for (const win of b.windows) {
      ctx.fillStyle = win.lit ? `rgba(255,230,150,${0.4 + Math.sin(gameTime * 0.01 + b.x) * 0.2})` : 'rgba(20,20,40,0.5)';
      ctx.fillRect(b.x + win.rx, by + win.ry, 8, 10);
    }
  }

  // Ground line glow
  ctx.strokeStyle = 'rgba(100,150,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
}

function drawDrone(obj) {
  const { x, y, rotorAngle, scale, opacity } = obj;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = opacity;

  const armLen = 18;
  const bodyR = 8;

  // Shadow below
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(0, 25, 20, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // X-shaped arms
  ctx.strokeStyle = '#556677';
  ctx.lineWidth = 3;
  ctx.shadowColor = 'rgba(100,180,255,0.4)';
  ctx.shadowBlur = 6;
  const angles = [-0.7, 0.7, Math.PI - 0.7, Math.PI + 0.7];
  for (const a of angles) {
    const ex = Math.cos(a) * armLen;
    const ey = Math.sin(a) * armLen * 0.5;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ex, ey); ctx.stroke();

    // Rotor disc
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(rotorAngle);
    ctx.strokeStyle = 'rgba(180,200,220,0.6)';
    ctx.lineWidth = 2;
    const rLen = 10;
    ctx.beginPath(); ctx.moveTo(-rLen, 0); ctx.lineTo(rLen, 0); ctx.stroke();
    ctx.rotate(Math.PI / 3);
    ctx.beginPath(); ctx.moveTo(-rLen, 0); ctx.lineTo(rLen, 0); ctx.stroke();
    ctx.rotate(Math.PI / 3);
    ctx.beginPath(); ctx.moveTo(-rLen, 0); ctx.lineTo(rLen, 0); ctx.stroke();
    // Rotor blur circle
    ctx.strokeStyle = 'rgba(180,200,220,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, rLen, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // Body - dark grey box shape
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#3a3a4a';
  ctx.beginPath();
  ctx.roundRect(-bodyR, -bodyR * 0.5, bodyR * 2, bodyR, 3);
  ctx.fill();
  ctx.strokeStyle = '#555566';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Camera underneath
  ctx.fillStyle = '#222233';
  ctx.beginPath();
  ctx.arc(0, 5, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4488aa';
  ctx.beginPath();
  ctx.arc(0, 5, 2, 0, Math.PI * 2);
  ctx.fill();

  // LED lights (front red, back green)
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff3333';
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-5, -4, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#33ff33';
  ctx.shadowColor = '#33ff33';
  ctx.beginPath(); ctx.arc(5, -4, 1.5, 0, Math.PI * 2); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBird(obj) {
  const { x, y, wingPhase, scale, opacity } = obj;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = opacity;

  const wing = Math.sin(wingPhase) * 15;

  // Body - brown/tan
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing top
  ctx.fillStyle = '#a07820';
  ctx.beginPath();
  ctx.moveTo(-5, -3);
  ctx.quadraticCurveTo(-2, -18 + wing, 10, -5 + wing * 0.3);
  ctx.lineTo(0, -2);
  ctx.fill();

  // Wing bottom (sometimes visible)
  ctx.beginPath();
  ctx.moveTo(-5, -3);
  ctx.quadraticCurveTo(-8, -18 + wing, -15, -3 + wing * 0.5);
  ctx.lineTo(-3, -1);
  ctx.fill();

  // Tail feathers
  ctx.fillStyle = '#6B4914';
  ctx.beginPath();
  ctx.moveTo(14, -2);
  ctx.lineTo(22, -5);
  ctx.lineTo(22, 2);
  ctx.lineTo(14, 1);
  ctx.fill();

  // Head
  ctx.fillStyle = '#7a5510';
  ctx.beginPath();
  ctx.arc(-14, -2, 5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ffaa33';
  ctx.beginPath();
  ctx.moveTo(-18, -3);
  ctx.lineTo(-24, -1);
  ctx.lineTo(-18, 0);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-15, -3, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-15.5, -3.5, 0.6, 0, Math.PI * 2); ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawAirplane(obj) {
  const { x, y, scale, opacity } = obj;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = opacity;

  // Fuselage - white/light grey
  ctx.fillStyle = '#e8e8f0';
  ctx.beginPath();
  ctx.ellipse(0, 0, 40, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Cockpit
  ctx.fillStyle = '#88ccff';
  ctx.beginPath();
  ctx.ellipse(-36, -1, 6, 5, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  ctx.fillStyle = '#d0d0dd';
  ctx.beginPath();
  ctx.moveTo(-5, -5);
  ctx.lineTo(5, -30);
  ctx.lineTo(15, -28);
  ctx.lineTo(8, -5);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-5, 5);
  ctx.lineTo(5, 30);
  ctx.lineTo(15, 28);
  ctx.lineTo(8, 5);
  ctx.fill();

  // Tail fin
  ctx.fillStyle = '#c0c0d0';
  ctx.beginPath();
  ctx.moveTo(32, -3);
  ctx.lineTo(40, -18);
  ctx.lineTo(42, -16);
  ctx.lineTo(38, -3);
  ctx.fill();

  // Tail horizontal
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(38, -10);
  ctx.lineTo(42, -8);
  ctx.lineTo(36, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(38, 10);
  ctx.lineTo(42, 8);
  ctx.lineTo(36, 0);
  ctx.fill();

  // Windows
  ctx.fillStyle = '#99bbdd';
  for (let wx = -25; wx < 25; wx += 6) {
    ctx.beginPath();
    ctx.arc(wx, -3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Engine (under wings)
  ctx.fillStyle = '#aaaabc';
  ctx.beginPath();
  ctx.ellipse(2, -18, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(2, 18, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Red stripe
  ctx.strokeStyle = '#cc3333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-30, 3);
  ctx.lineTo(30, 3);
  ctx.stroke();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFlashTexts() {
  for (const ft of flashTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    const s = 1 + (1 - ft.life) * 0.3;
    ctx.translate(ft.x, ft.y);
    ctx.scale(s, s);
    ctx.font = `bold ${ft.size}px Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 3;
    ctx.strokeText(ft.text, 0, 0);
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 15;
    ctx.fillText(ft.text, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawHeart(x, y, size, filled) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, size * 0.3);
  ctx.bezierCurveTo(0, 0, -size, -size * 0.2, -size, size * 0.3);
  ctx.bezierCurveTo(-size, size * 0.8, 0, size * 1.2, 0, size * 1.5);
  ctx.bezierCurveTo(0, size * 1.2, size, size * 0.8, size, size * 0.3);
  ctx.bezierCurveTo(size, -size * 0.2, 0, 0, 0, size * 0.3);
  ctx.closePath();
  if (filled) {
    ctx.fillStyle = '#ff4466';
    ctx.shadowColor = '#ff4466';
    ctx.shadowBlur = 8;
    ctx.fill();
  } else {
    ctx.strokeStyle = 'rgba(255,68,102,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawHUD() {
  // Score (top-right)
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W - 160, 8, 150, 36);
  ctx.strokeStyle = 'rgba(100,180,255,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(W - 160, 8, 150, 36);
  ctx.fillStyle = '#aaddff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${score}`, W - 85, 32);

  // Lives (top-left)
  for (let i = 0; i < 5; i++) {
    drawHeart(20 + i * 28, 12, 8, i < lives);
  }

  // Combo (center)
  if (combo >= 2 && comboTimer > 0) {
    const a = Math.min(1, comboTimer / 30);
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffdd44';
    ctx.shadowColor = '#ffdd44';
    ctx.shadowBlur = 15;
    ctx.font = `bold ${28 + combo * 2}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`COMBO x${comboMultiplier}`, W / 2, 70);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Best score (subtle)
  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(150,200,255,0.4)';
    ctx.font = '12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`BEST: ${bestScore}`, W - 15, H - 60);
  }
}

// ===== MENU =====

function drawMenuScreen() {
  // Darken
  ctx.fillStyle = 'rgba(10,15,40,0.55)';
  ctx.fillRect(0, 0, W, H);

  // Neon border
  ctx.strokeStyle = 'rgba(100,180,255,0.35)';
  ctx.lineWidth = 2;
  ctx.strokeRect(25, 25, W - 50, H - 50);

  const cy = H * 0.28;
  ctx.textAlign = 'center';

  // Big Hebrew title with glow
  const titleSize = Math.min(100, W * 0.14);
  ctx.fillStyle = '#44ffaa';
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 40;
  ctx.font = `bold ${titleSize}px Arial, sans-serif`;
  ctx.fillText('\u05DB\u05D8\u05D1"\u05DD', W / 2, cy);
  ctx.shadowBlur = 20;
  ctx.fillText('\u05DB\u05D8\u05D1"\u05DD', W / 2, cy);

  // Subtitle Hebrew
  ctx.shadowBlur = 10;
  ctx.font = `bold ${Math.min(30, W * 0.04)}px Arial, sans-serif`;
  ctx.fillStyle = '#88aacc';
  ctx.fillText('?\u05DE\u05D4 \u05D6\u05D4 \u05D1\u05E9\u05DE\u05D9\u05D9\u05DD', W / 2, cy + 50);

  // English subtitle
  ctx.shadowBlur = 5;
  ctx.font = `${Math.min(20, W * 0.028)}px monospace`;
  ctx.fillStyle = '#6699bb';
  ctx.fillText('Tap only the drones!', W / 2, cy + 85);

  ctx.shadowBlur = 0;

  // Animated objects on menu
  const menuT = gameTime * 0.015;

  // Draw a sample drone flying
  const mdx = W * 0.3 + Math.sin(menuT * 1.3) * W * 0.15;
  const mdy = cy + 140 + Math.sin(menuT * 2) * 15;
  drawDrone({ x: mdx, y: mdy, rotorAngle: gameTime * 0.4, scale: 1, opacity: 1 });
  ctx.fillStyle = 'rgba(68,255,170,0.6)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('\u05DB\u05D8\u05D1"\u05DD', mdx, mdy + 30);

  // Draw a sample bird
  const mbx = W * 0.55 + Math.sin(menuT * 1.1 + 2) * W * 0.1;
  const mby = cy + 130 + Math.sin(menuT * 1.8 + 1) * 12;
  drawBird({ x: mbx, y: mby, wingPhase: gameTime * 0.15, scale: 1, opacity: 1 });
  ctx.fillStyle = 'rgba(255,80,80,0.6)';
  ctx.font = '12px Arial';
  ctx.fillText('\u05E6\u05D9\u05E4\u05D5\u05E8', mbx, mby + 25);

  // Draw a sample airplane
  const max = W * 0.75 + Math.sin(menuT * 0.8 + 4) * W * 0.08;
  const may = cy + 145 + Math.sin(menuT * 1.5 + 3) * 10;
  drawAirplane({ x: max, y: may, scale: 0.8, opacity: 1 });
  ctx.fillStyle = 'rgba(255,80,80,0.6)';
  ctx.font = '12px Arial';
  ctx.fillText('\u05DE\u05D8\u05D5\u05E1', max, may + 35);

  // Checkmark / X indicators
  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = '#44ff88';
  ctx.fillText('V', mdx, mdy - 28);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('X', mbx, mby - 22);
  ctx.fillText('X', max, may - 32);

  // Play button
  const btnY = cy + 240;
  const pulse = Math.sin(gameTime * 0.06) * 0.2 + 0.8;
  ctx.fillStyle = `rgba(68,255,170,${pulse * 0.25})`;
  ctx.strokeStyle = `rgba(68,255,170,${pulse})`;
  ctx.lineWidth = 2;
  const btnW = 200, btnH = 55;
  ctx.beginPath();
  ctx.roundRect(W / 2 - btnW / 2, btnY - btnH / 2, btnW, btnH, 28);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.min(26, W * 0.04)}px monospace`;
  ctx.fillText('PLAY', W / 2, btnY + 9);

  // Instructions
  ctx.fillStyle = 'rgba(150,180,220,0.5)';
  ctx.font = `${Math.min(14, W * 0.02)}px monospace`;
  ctx.fillText('Tap/Click drones to destroy them', W / 2, H - 80);
  ctx.fillText('Don\'t tap birds or airplanes!', W / 2, H - 58);

  // Best score
  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,220,100,0.6)';
    ctx.fillText(`Best: ${bestScore}`, W / 2, H - 100);
  }
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(10,10,30,0.75)';
  ctx.fillRect(0, 0, W, H);

  const cy = H * 0.28;
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff5555';
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 25;
  ctx.font = `bold ${Math.min(64, W * 0.09)}px Arial, sans-serif`;
  ctx.fillText('GAME OVER', W / 2, cy);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#aaddff';
  ctx.font = `bold ${Math.min(36, W * 0.05)}px monospace`;
  ctx.fillText(`${score}`, W / 2, cy + 55);

  ctx.fillStyle = 'rgba(150,200,255,0.6)';
  ctx.font = `${Math.min(18, W * 0.025)}px monospace`;
  ctx.fillText(`BEST: ${bestScore}`, W / 2, cy + 90);

  if (score >= bestScore && score > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.shadowColor = '#ffdd44';
    ctx.shadowBlur = 15;
    ctx.font = `bold ${Math.min(22, W * 0.03)}px monospace`;
    ctx.fillText('NEW BEST!', W / 2, cy + 120);
    ctx.shadowBlur = 0;
  }

  // Play again button
  const btnY = cy + 180;
  const pulse = Math.sin(gameTime * 0.06) * 0.2 + 0.8;
  ctx.fillStyle = `rgba(68,255,170,${pulse * 0.25})`;
  ctx.strokeStyle = `rgba(68,255,170,${pulse})`;
  ctx.lineWidth = 2;
  const btnW = 220, btnH = 55;
  ctx.beginPath();
  ctx.roundRect(W / 2 - btnW / 2, btnY - btnH / 2, btnW, btnH, 28);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.min(22, W * 0.03)}px monospace`;
  ctx.fillText('PLAY AGAIN', W / 2, btnY + 8);
}

// ===== UPDATE =====

function update() {
  gameTime++;

  // Clouds always move
  for (const c of clouds) {
    c.x -= c.speed;
    if (c.x < -c.w) { c.x = W + c.w + Math.random() * 100; c.y = 30 + Math.random() * (H * 0.5); }
  }

  if (state !== STATE.PLAYING) return;

  // Difficulty ramp based on score
  difficulty = 1 + score / 80;
  spawnInterval = Math.max(20, 90 - difficulty * 4);

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnObject();
    spawnTimer = 0;
    // Sometimes spawn extras at higher difficulty
    if (difficulty > 3 && Math.random() < 0.3) spawnObject();
    if (difficulty > 6 && Math.random() < 0.2) spawnObject();
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) { combo = 0; comboMultiplier = 1; }
  }

  // Update flying objects
  for (let i = flyingObjects.length - 1; i >= 0; i--) {
    const obj = flyingObjects[i];
    if (!obj.alive) { flyingObjects.splice(i, 1); continue; }

    obj.x -= obj.speed;
    obj.y += obj.vy;

    // Slight wave motion
    if (obj.type === OBJ_BIRD) {
      obj.y += Math.sin(gameTime * 0.05 + i * 3) * 0.5;
      obj.wingPhase += 0.15;
    }
    if (obj.type === OBJ_DRONE) {
      obj.rotorAngle += 0.4;
      obj.y += Math.sin(gameTime * 0.03 + i * 2) * 0.3;
    }

    // Bounce off top/bottom
    if (obj.y < 40 || obj.y > H - 90) obj.vy *= -1;
    if (obj.y < 40) obj.y = 40;
    if (obj.y > H - 90) obj.y = H - 90;

    // Remove if off screen left
    if (obj.x < -80) {
      flyingObjects.splice(i, 1);
      // No penalty for missing drones
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // slight gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update flash texts
  for (let i = flashTexts.length - 1; i >= 0; i--) {
    const ft = flashTexts[i];
    ft.y -= 1.2;
    ft.life -= 0.018;
    if (ft.life <= 0) flashTexts.splice(i, 1);
  }

  // Screen effects decay
  if (screenFlash > 0) screenFlash -= 0.03;
  if (screenShake > 0) screenShake -= 0.8;
}

// ===== MAIN DRAW =====

function draw() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;
    ctx.translate(sx, sy);
  }

  drawSky();

  // Clouds (back layer)
  for (let i = 0; i < clouds.length; i++) {
    if (i < 7) drawCloud(clouds[i]);
  }

  if (state === STATE.MENU) {
    drawCitySilhouette();
    // Front clouds
    for (let i = 7; i < clouds.length; i++) drawCloud(clouds[i]);
    drawMenuScreen();
    ctx.restore();
    return;
  }

  // Draw flying objects sorted by type for layering (airplanes back, drones middle, birds front)
  const airplanes = flyingObjects.filter(o => o.type === OBJ_AIRPLANE);
  const drones = flyingObjects.filter(o => o.type === OBJ_DRONE);
  const birds = flyingObjects.filter(o => o.type === OBJ_BIRD);

  for (const obj of airplanes) drawAirplane(obj);

  // Front clouds
  for (let i = 7; i < clouds.length; i++) drawCloud(clouds[i]);

  for (const obj of drones) drawDrone(obj);
  for (const obj of birds) drawBird(obj);

  drawCitySilhouette();
  drawParticles();
  drawFlashTexts();
  drawHUD();

  // Screen flash overlay
  if (screenFlash > 0) {
    ctx.fillStyle = screenFlashColor + Math.min(0.4, screenFlash) + ')';
    ctx.fillRect(-20, -20, W + 40, H + 40);
  }

  if (state === STATE.GAMEOVER) {
    drawGameOverScreen();
  }

  ctx.restore();
}

// Game loop
function loop() {
  if (state === STATE.PLAYING) {
    update();
    draw();
  }
  gameTime++;
  requestAnimationFrame(loop);
}

loop();
</script>
