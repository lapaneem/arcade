// ---- STATE ----
let state = 'title'; // title, select, play, complete
let currentLevel = 0;
let grid = [];
let gridW = 0, gridH = 0;
let cellSize = 0;
let offsetX = 0, offsetY = 0;
let player = {x:0, y:0};
let stars = [];
let collectedStars = [];
let blocks = [];
let teleports = [];
let exitPos = {x:0, y:0};
let moveCount = 0;
let history = [];
let sliding = false;
let slideAnim = {fromX:0, fromY:0, toX:0, toY:0, t:0, duration:0.18};
let blockSlideAnim = null;
let starsCollected = 0;
let totalStars = 0;
let exitOpen = false;
let flashTimer = 0;
let deathTimer = 0;
let completeTimer = 0;
let particles = [];
let sparkles = [];
let portalAngle = 0;
let teleportAngle = 0;
let starAngle = 0;
let orbTrail = [];

// Save data
let saveData = JSON.parse(localStorage.getItem('gravityPuzzleSave') || '{}');
if (!saveData.completed) saveData.completed = {};
if (!saveData.stars) saveData.stars = {};
if (!saveData.bestMoves) saveData.bestMoves = {};
if (!saveData.unlocked) saveData.unlocked = {0: true};

function saveProg() {
  localStorage.setItem('gravityPuzzleSave', JSON.stringify(saveData));
}

// ---- LEVEL LOADING ----
function loadLevel(idx) {
  currentLevel = idx;
  const lvl = LEVELS[idx];
  grid = [];
  stars = [];
  collectedStars = [];
  blocks = [];
  teleports = [];
  history = [];
  moveCount = 0;
  starsCollected = 0;
  sliding = false;
  flashTimer = 0;
  deathTimer = 0;
  completeTimer = 0;
  particles = [];
  orbTrail = [];
  blockSlideAnim = null;

  gridH = lvl.grid.length;
  gridW = lvl.grid[0].length;

  for (let y = 0; y < gridH; y++) {
    grid[y] = [];
    for (let x = 0; x < gridW; x++) {
      const ch = lvl.grid[y][x] || '.';
      if (ch === 'P') { player = {x, y}; grid[y][x] = '.'; }
      else if (ch === 'E') { exitPos = {x, y}; grid[y][x] = 'E'; }
      else if (ch === '*') { stars.push({x, y, collected: false}); grid[y][x] = '.'; }
      else if (ch === 'B') { blocks.push({x, y}); grid[y][x] = '.'; }
      else if (ch === 'T') { teleports.push({x, y}); grid[y][x] = 'T'; }
      else { grid[y][x] = ch; }
    }
  }

  totalStars = stars.length;
  exitOpen = totalStars === 0;

  // Calculate cell size to fit in play area
  const playAreaW = W - 40;
  const playAreaH = H - 180;
  cellSize = Math.min(Math.floor(playAreaW / gridW), Math.floor(playAreaH / gridH));
  offsetX = Math.floor((W - gridW * cellSize) / 2);
  offsetY = Math.floor((H - 180 - gridH * cellSize) / 2) + 120;

  state = 'play';
}

function saveState() {
  return {
    px: player.x, py: player.y,
    blocks: blocks.map(b => ({x: b.x, y: b.y})),
    stars: stars.map(s => s.collected),
    starsCollected, exitOpen
  };
}

function restoreState(s) {
  player.x = s.px; player.y = s.py;
  blocks = s.blocks.map(b => ({x: b.x, y: b.y}));
  for (let i = 0; i < stars.length; i++) stars[i].collected = s.stars[i];
  starsCollected = s.starsCollected;
  exitOpen = s.exitOpen;
}

function undo() {
  if (history.length > 0 && !sliding && deathTimer <= 0) {
    restoreState(history.pop());
    moveCount = Math.max(0, moveCount - 1);
  }
}

function resetLevel() {
  loadLevel(currentLevel);
}

// ---- MOVEMENT ----
function getBlockAt(x, y) {
  for (let i = 0; i < blocks.length; i++) {
    if (blocks[i].x === x && blocks[i].y === y) return i;
  }
  return -1;
}

function isSolid(x, y, ignoredBlock) {
  if (x < 0 || y < 0 || x >= gridW || y >= gridH) return true;
  if (grid[y][x] === '#') return true;
  for (let i = 0; i < blocks.length; i++) {
    if (i === ignoredBlock) continue;
    if (blocks[i].x === x && blocks[i].y === y) return true;
  }
  return false;
}

function tryMove(dx, dy) {
  if (sliding || deathTimer > 0 || completeTimer > 0) return;

  const prev = saveState();
  let px = player.x, py = player.y;
  let moved = false;
  let pushBlock = -1;
  let blockPath = null;

  // Slide until hitting something
  let steps = 0;
  let keepSliding = true;

  while (keepSliding) {
    keepSliding = false; // Default: stop after this step
    let nx = px + dx, ny = py + dy;

    // Check wall
    if (nx < 0 || ny < 0 || nx >= gridW || ny >= gridH || grid[ny][nx] === '#') break;

    // Check block
    let bi = getBlockAt(nx, ny);
    if (bi >= 0) {
      // Try to push block
      let bx = blocks[bi].x + dx, by = blocks[bi].y + dy;
      if (!isSolid(bx, by, bi)) {
        pushBlock = bi;
        blockPath = {fromX: blocks[bi].x, fromY: blocks[bi].y, toX: bx, toY: by};
        // Push block all the way
        while (!isSolid(bx + dx, by + dy, bi)) {
          bx += dx; by += dy;
        }
        blockPath.toX = bx; blockPath.toY = by;
        blocks[bi].x = bx; blocks[bi].y = by;
        px = nx; py = ny;
        moved = true;
        // Stop after pushing a block (don't set keepSliding)
      } else {
        break; // Can't push, stop
      }
    } else {
      px = nx; py = ny;
      moved = true;
    }

    // Check hazard
    if (grid[py][px] === 'X') {
      history.push(prev);
      moveCount++;
      startSlide(player.x, player.y, px, py, pushBlock >= 0 ? blockPath : null);
      player.x = px; player.y = py;
      deathTimer = 0.01;
      return;
    }

    // Check star collection
    for (let s of stars) {
      if (!s.collected && s.x === px && s.y === py) {
        s.collected = true;
        starsCollected++;
        flashTimer = 0.3;
        spawnSparkles(px, py);
        if (starsCollected >= totalStars) exitOpen = true;
      }
    }

    // Check teleport
    if (grid[py][px] === 'T') {
      for (let ti = 0; ti < teleports.length; ti++) {
        if (teleports[ti].x === px && teleports[ti].y === py) {
          let paired = (ti % 2 === 0) ? ti + 1 : ti - 1;
          if (paired >= 0 && paired < teleports.length) {
            px = teleports[paired].x;
            py = teleports[paired].y;
          }
          break;
        }
      }
      // Continue sliding from teleport destination if on ice there
      if (grid[py][px] === 'I') keepSliding = true;
    }

    // Check exit at current position
    if (exitOpen && px === exitPos.x && py === exitPos.y) break;

    // If on ice tile, keep sliding
    if (grid[py][px] === 'I') keepSliding = true;

    steps++;
    if (steps > 50) break;
  }

  if (!moved) return;

  history.push(prev);
  moveCount++;
  startSlide(prev.px, prev.py, px, py, pushBlock >= 0 ? blockPath : null);
  player.x = px; player.y = py;

  // Check exit
  if (exitOpen && px === exitPos.x && py === exitPos.y) {
    completeTimer = 0.01;
  }
}

function startSlide(fx, fy, tx, ty, bPath) {
  sliding = true;
  slideAnim.fromX = fx; slideAnim.fromY = fy;
  slideAnim.toX = tx; slideAnim.toY = ty;
  slideAnim.t = 0;
  let dist = Math.abs(tx - fx) + Math.abs(ty - fy);
  slideAnim.duration = Math.min(0.35, 0.06 + dist * 0.04);
  blockSlideAnim = bPath ? {...bPath, t: 0, duration: slideAnim.duration} : null;
}

function spawnSparkles(gx, gy) {
  let cx = offsetX + (gx + 0.5) * cellSize;
  let cy = offsetY + (gy + 0.5) * cellSize;
  for (let i = 0; i < 12; i++) {
    let a = Math.random() * Math.PI * 2;
    sparkles.push({x: cx, y: cy, vx: Math.cos(a) * (80 + Math.random()*80), vy: Math.sin(a) * (80 + Math.random()*80), life: 0.7, maxLife: 0.7, color: '#ffd700'});
  }
}

function spawnDeathParticles() {
  let cx = offsetX + (player.x + 0.5) * cellSize;
  let cy = offsetY + (player.y + 0.5) * cellSize;
  for (let i = 0; i < 20; i++) {
    let a = Math.random() * Math.PI * 2;
    particles.push({x: cx, y: cy, vx: Math.cos(a) * (60 + Math.random()*100), vy: Math.sin(a) * (60 + Math.random()*100), life: 0.8, maxLife: 0.8, color: '#ff3333', size: 3});
  }
}

function spawnCompleteParticles() {
  for (let i = 0; i < 60; i++) {
    let x = Math.random() * W;
    let y = Math.random() * H;
    let a = Math.random() * Math.PI * 2;
    let colors = ['#00ff88', '#ffd700', '#00ffff', '#ff66ff', '#ffffff'];
    particles.push({x, y, vx: Math.cos(a) * (30 + Math.random()*60), vy: Math.sin(a) * (30 + Math.random()*60) - 40, life: 1.5, maxLife: 1.5, color: colors[Math.floor(Math.random()*colors.length)], size: 2 + Math.random()*3});
  }
}

// ---- EASING ----
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeOutQuad(t) { return 1 - (1-t)*(1-t); }

// ---- RENDERING ----
function drawGrid() {
  // Grid lines
  X.strokeStyle = 'rgba(255,255,255,0.04)';
  X.lineWidth = 1;
  for (let x = 0; x <= gridW; x++) {
    X.beginPath();
    X.moveTo(offsetX + x * cellSize, offsetY);
    X.lineTo(offsetX + x * cellSize, offsetY + gridH * cellSize);
    X.stroke();
  }
  for (let y = 0; y <= gridH; y++) {
    X.beginPath();
    X.moveTo(offsetX, offsetY + y * cellSize);
    X.lineTo(offsetX + gridW * cellSize, offsetY + y * cellSize);
    X.stroke();
  }

  // Draw tiles
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      let cx = offsetX + x * cellSize;
      let cy = offsetY + y * cellSize;
      let ch = grid[y][x];

      if (ch === '#') {
        // Wall
        X.fillStyle = '#1a1a2e';
        X.fillRect(cx, cy, cellSize, cellSize);
        X.strokeStyle = '#2a2a4a';
        X.lineWidth = 1.5;
        X.strokeRect(cx + 1, cy + 1, cellSize - 2, cellSize - 2);
      } else if (ch === '.') {
        X.fillStyle = '#0d0d1a';
        X.fillRect(cx, cy, cellSize, cellSize);
      } else if (ch === 'E') {
        X.fillStyle = '#0d0d1a';
        X.fillRect(cx, cy, cellSize, cellSize);
        // Exit portal
        let pulse = 0.6 + 0.4 * Math.sin(portalAngle * 2);
        let color = exitOpen ? `rgba(0,255,100,${pulse * 0.4})` : `rgba(100,100,100,0.2)`;
        X.fillStyle = color;
        X.fillRect(cx + 2, cy + 2, cellSize - 4, cellSize - 4);
        // Glow
        let grd = X.createRadialGradient(cx + cellSize/2, cy + cellSize/2, 0, cx + cellSize/2, cy + cellSize/2, cellSize * 0.7);
        if (exitOpen) {
          grd.addColorStop(0, `rgba(0,255,100,${pulse * 0.5})`);
          grd.addColorStop(1, 'rgba(0,255,100,0)');
        } else {
          grd.addColorStop(0, 'rgba(100,100,100,0.15)');
          grd.addColorStop(1, 'rgba(100,100,100,0)');
        }
        X.fillStyle = grd;
        X.beginPath();
        X.arc(cx + cellSize/2, cy + cellSize/2, cellSize * 0.7, 0, Math.PI * 2);
        X.fill();
        // Swirl
        if (exitOpen) {
          X.strokeStyle = `rgba(0,255,100,${pulse * 0.6})`;
          X.lineWidth = 2;
          X.beginPath();
          X.arc(cx + cellSize/2, cy + cellSize/2, cellSize * 0.25 + Math.sin(portalAngle*3) * 4, portalAngle, portalAngle + Math.PI * 1.5);
          X.stroke();
        }
      } else if (ch === 'X') {
        X.fillStyle = '#0d0d1a';
        X.fillRect(cx, cy, cellSize, cellSize);
        // Spikes
        let glow = 0.7 + 0.3 * Math.sin(portalAngle * 4);
        X.fillStyle = `rgba(255,50,50,${glow * 0.8})`;
        let m = cellSize * 0.15;
        // Draw triangles
        X.beginPath();
        X.moveTo(cx + m, cy + cellSize - m);
        X.lineTo(cx + cellSize/4, cy + m + 2);
        X.lineTo(cx + cellSize/2 - m, cy + cellSize - m);
        X.fill();
        X.beginPath();
        X.moveTo(cx + cellSize/2 - m/2, cy + cellSize - m);
        X.lineTo(cx + cellSize/2, cy + m + 2);
        X.lineTo(cx + cellSize/2 + m/2 + cellSize/4 - m, cy + cellSize - m);
        X.fill();
        X.beginPath();
        X.moveTo(cx + cellSize - cellSize/2 + m/2, cy + cellSize - m);
        X.lineTo(cx + cellSize - cellSize/4, cy + m + 2);
        X.lineTo(cx + cellSize - m, cy + cellSize - m);
        X.fill();
        // Glow
        let sgrd = X.createRadialGradient(cx + cellSize/2, cy + cellSize/2, 0, cx + cellSize/2, cy + cellSize/2, cellSize * 0.6);
        sgrd.addColorStop(0, `rgba(255,30,30,${glow * 0.2})`);
        sgrd.addColorStop(1, 'rgba(255,30,30,0)');
        X.fillStyle = sgrd;
        X.beginPath();
        X.arc(cx + cellSize/2, cy + cellSize/2, cellSize * 0.6, 0, Math.PI * 2);
        X.fill();
      } else if (ch === 'I') {
        // Ice
        X.fillStyle = 'rgba(100,180,255,0.15)';
        X.fillRect(cx, cy, cellSize, cellSize);
        X.strokeStyle = 'rgba(150,210,255,0.3)';
        X.lineWidth = 1;
        X.strokeRect(cx + 2, cy + 2, cellSize - 4, cellSize - 4);
        // Ice lines
        X.strokeStyle = 'rgba(200,230,255,0.15)';
        X.beginPath();
        X.moveTo(cx + cellSize * 0.2, cy + cellSize * 0.3);
        X.lineTo(cx + cellSize * 0.6, cy + cellSize * 0.3);
        X.moveTo(cx + cellSize * 0.4, cy + cellSize * 0.6);
        X.lineTo(cx + cellSize * 0.8, cy + cellSize * 0.6);
        X.stroke();
      } else if (ch === 'T') {
        X.fillStyle = '#0d0d1a';
        X.fillRect(cx, cy, cellSize, cellSize);
        // Teleporter
        let tp = 0.6 + 0.4 * Math.sin(teleportAngle * 3);
        let tgrd = X.createRadialGradient(cx + cellSize/2, cy + cellSize/2, 0, cx + cellSize/2, cy + cellSize/2, cellSize * 0.5);
        tgrd.addColorStop(0, `rgba(180,60,255,${tp * 0.5})`);
        tgrd.addColorStop(1, 'rgba(180,60,255,0)');
        X.fillStyle = tgrd;
        X.beginPath();
        X.arc(cx + cellSize/2, cy + cellSize/2, cellSize * 0.5, 0, Math.PI * 2);
        X.fill();
        // Swirl
        X.strokeStyle = `rgba(200,100,255,${tp * 0.7})`;
        X.lineWidth = 2;
        for (let i = 0; i < 2; i++) {
          X.beginPath();
          X.arc(cx + cellSize/2, cy + cellSize/2, cellSize * 0.2 + i * 6, teleportAngle + i * Math.PI, teleportAngle + i * Math.PI + Math.PI);
          X.stroke();
        }
      }
    }
  }
}

function drawStars() {
  for (let s of stars) {
    if (s.collected) continue;
    let cx = offsetX + (s.x + 0.5) * cellSize;
    let cy = offsetY + (s.y + 0.5) * cellSize;
    let r = cellSize * 0.25;
    let glow = 0.7 + 0.3 * Math.sin(starAngle * 3);

    // Glow
    let grd = X.createRadialGradient(cx, cy, 0, cx, cy, r * 2.5);
    grd.addColorStop(0, `rgba(255,215,0,${glow * 0.3})`);
    grd.addColorStop(1, 'rgba(255,215,0,0)');
    X.fillStyle = grd;
    X.beginPath();
    X.arc(cx, cy, r * 2.5, 0, Math.PI * 2);
    X.fill();

    // Star shape
    X.fillStyle = `rgba(255,215,0,${glow})`;
    X.beginPath();
    for (let i = 0; i < 5; i++) {
      let a = starAngle + (i * Math.PI * 2 / 5) - Math.PI / 2;
      let px = cx + Math.cos(a) * r;
      let py = cy + Math.sin(a) * r;
      if (i === 0) X.moveTo(px, py); else X.lineTo(px, py);
      a += Math.PI / 5;
      px = cx + Math.cos(a) * r * 0.45;
      py = cy + Math.sin(a) * r * 0.45;
      X.lineTo(px, py);
    }
    X.closePath();
    X.fill();
  }
}

function drawBlocks() {
  for (let i = 0; i < blocks.length; i++) {
    let b = blocks[i];
    let bx = b.x, by = b.y;

    // Animated position
    if (blockSlideAnim && sliding && i === -1) {
      // Not used directly now; blocks snap to final
    }

    let cx = offsetX + bx * cellSize;
    let cy = offsetY + by * cellSize;

    // Block
    X.fillStyle = 'rgba(255,160,50,0.7)';
    X.fillRect(cx + 3, cy + 3, cellSize - 6, cellSize - 6);
    X.strokeStyle = 'rgba(255,180,80,0.9)';
    X.lineWidth = 2;
    X.strokeRect(cx + 3, cy + 3, cellSize - 6, cellSize - 6);

    // Glow
    let grd = X.createRadialGradient(cx + cellSize/2, cy + cellSize/2, 0, cx + cellSize/2, cy + cellSize/2, cellSize * 0.5);
    grd.addColorStop(0, 'rgba(255,160,50,0.15)');
    grd.addColorStop(1, 'rgba(255,160,50,0)');
    X.fillStyle = grd;
    X.beginPath();
    X.arc(cx + cellSize/2, cy + cellSize/2, cellSize * 0.5, 0, Math.PI * 2);
    X.fill();
  }
}

function drawPlayer() {
  let px, py;
  if (sliding) {
    let t = Math.min(slideAnim.t / slideAnim.duration, 1);
    let et = easeOutBack(t);
    // Clamp overshoot from easeOutBack
    et = Math.max(0, Math.min(1.05, et));
    px = offsetX + (slideAnim.fromX + (slideAnim.toX - slideAnim.fromX) * et + 0.5) * cellSize;
    py = offsetY + (slideAnim.fromY + (slideAnim.toY - slideAnim.fromY) * et + 0.5) * cellSize;
  } else {
    px = offsetX + (player.x + 0.5) * cellSize;
    py = offsetY + (player.y + 0.5) * cellSize;
  }

  // Trail
  orbTrail.push({x: px, y: py, life: 0.4});

  let r = cellSize * 0.3;

  // Draw trail
  for (let t of orbTrail) {
    let a = t.life / 0.4;
    X.fillStyle = `rgba(0,255,255,${a * 0.15})`;
    X.beginPath();
    X.arc(t.x, t.y, r * a * 0.8, 0, Math.PI * 2);
    X.fill();
  }

  // Outer glow
  let grd = X.createRadialGradient(px, py, 0, px, py, r * 3);
  grd.addColorStop(0, 'rgba(0,255,255,0.2)');
  grd.addColorStop(1, 'rgba(0,255,255,0)');
  X.fillStyle = grd;
  X.beginPath();
  X.arc(px, py, r * 3, 0, Math.PI * 2);
  X.fill();

  // Inner glow
  grd = X.createRadialGradient(px, py, 0, px, py, r);
  grd.addColorStop(0, 'rgba(200,255,255,0.95)');
  grd.addColorStop(0.5, 'rgba(0,255,255,0.7)');
  grd.addColorStop(1, 'rgba(0,200,255,0.3)');
  X.fillStyle = grd;
  X.beginPath();
  X.arc(px, py, r, 0, Math.PI * 2);
  X.fill();

  // Core
  X.fillStyle = '#ffffff';
  X.beginPath();
  X.arc(px, py, r * 0.3, 0, Math.PI * 2);
  X.fill();
}

function drawParticles() {
  for (let p of particles) {
    let a = p.life / p.maxLife;
    X.fillStyle = p.color.replace(')', `,${a})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      let r = parseInt(p.color.slice(1,3),16), g = parseInt(p.color.slice(3,5),16), b = parseInt(p.color.slice(5,7),16);
      X.fillStyle = `rgba(${r},${g},${b},${a})`;
    }
    X.beginPath();
    X.arc(p.x, p.y, (p.size || 2) * a, 0, Math.PI * 2);
    X.fill();
  }
  for (let s of sparkles) {
    let a = s.life / s.maxLife;
    X.fillStyle = `rgba(255,215,0,${a})`;
    X.beginPath();
    X.arc(s.x, s.y, 3 * a, 0, Math.PI * 2);
    X.fill();
  }
}

// ---- MAIN LOOP ----
let lastTime = 0;
function update(dt) {
  portalAngle += dt * 1.5;
  teleportAngle += dt * 2;
  starAngle += dt * 1.2;

  // Update slide animation
  if (sliding) {
    slideAnim.t += dt;
    if (blockSlideAnim) blockSlideAnim.t += dt;
    if (slideAnim.t >= slideAnim.duration) {
      sliding = false;
      // Check death after animation
      if (deathTimer > 0) {
        deathTimer = 1.0;
        spawnDeathParticles();
      }
      // Check complete after animation
      if (completeTimer > 0 && completeTimer < 0.1) {
        completeTimer = 0.1;
        spawnCompleteParticles();
        // Save progress
        saveData.completed[currentLevel] = true;
        saveData.stars[currentLevel] = Math.max(saveData.stars[currentLevel] || 0, starsCollected);
        if (!saveData.bestMoves[currentLevel] || moveCount < saveData.bestMoves[currentLevel]) {
          saveData.bestMoves[currentLevel] = moveCount;
        }
        if (currentLevel < 19) saveData.unlocked[currentLevel + 1] = true;
        saveProg();
      }
    }
  }

  // Death timer
  if (deathTimer > 0.01) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      resetLevel();
    }
  }

  // Complete timer
  if (completeTimer >= 0.1) {
    completeTimer += dt;
  }

  // Flash
  if (flashTimer > 0) flashTimer -= dt;

  // Particles
  for (let p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  for (let s of sparkles) {
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.life -= dt;
  }
  sparkles = sparkles.filter(s => s.life > 0);

  // Trail decay
  for (let t of orbTrail) t.life -= dt;
  orbTrail = orbTrail.filter(t => t.life > 0);
  if (orbTrail.length > 20) orbTrail.splice(0, orbTrail.length - 20);
}

function draw() {
  X.fillStyle = '#0a0a12';
  X.fillRect(0, 0, W, H);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'select') {
    drawSelect();
  } else if (state === 'play') {
    drawGrid();
    drawStars();
    drawBlocks();
    if (deathTimer <= 0.01) drawPlayer();
    drawParticles();
    drawFlash();
    drawHUD();
    if (completeTimer >= 0.1) drawCompletePopup();
  }
}

function loop(ts) {
  let dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame((ts) => { lastTime = ts; loop(ts); });

// ---- INPUT ----
document.addEventListener('keydown', (e) => {
  if (state === 'title') {
    if (e.key === 'Enter' || e.key === ' ') { state = 'select'; e.preventDefault(); }
    return;
  }
  if (state === 'select') {
    if (e.key === 'Escape') state = 'title';
    return;
  }
  if (state === 'play') {
    if (completeTimer >= 0.1) {
      if (e.key === 'Enter' || e.key === ' ') {
        if (currentLevel < 19) loadLevel(currentLevel + 1);
        else state = 'select';
      }
      if (e.key === 'Escape') state = 'select';
      return;
    }
    switch(e.key) {
      case 'ArrowUp': case 'w': case 'W': tryMove(0, -1); e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': tryMove(0, 1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': tryMove(-1, 0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': tryMove(1, 0); e.preventDefault(); break;
      case 'r': case 'R': resetLevel(); break;
      case 'u': case 'U': undo(); break;
      case 'Escape': state = 'select'; break;
    }
  }
});

// ---- TOUCH / CLICK ----
let touchStart = null;
C.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now()};
}, {passive: false});

C.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchStart) return;
  let touch = e.changedTouches[0];
  let dx = touch.clientX - touchStart.x;
  let dy = touch.clientY - touchStart.y;
  let dist = Math.sqrt(dx*dx + dy*dy);
  let elapsed = Date.now() - touchStart.time;

  // Check for tap (short distance, short time)
  if (dist < 20 && elapsed < 300) {
    handleClick(touch.clientX, touch.clientY);
  } else if (dist > 30 && state === 'play' && completeTimer < 0.1) {
    // Swipe
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  }
  touchStart = null;
}, {passive: false});

C.addEventListener('click', (e) => {
  let rect = C.getBoundingClientRect();
  let scaleX = W / rect.width;
  let scaleY = H / rect.height;
  let x = (e.clientX - rect.left) * scaleX;
  let y = (e.clientY - rect.top) * scaleY;
  handleClickCanvas(x, y);
});

function handleClick(clientX, clientY) {
  let rect = C.getBoundingClientRect();
  let scaleX = W / rect.width;
  let scaleY = H / rect.height;
  let x = (clientX - rect.left) * scaleX;
  let y = (clientY - rect.top) * scaleY;
  handleClickCanvas(x, y);
}

function handleClickCanvas(x, y) {
  if (state === 'title') {
    // Play button
    if (y > 420 && y < 470 && x > W/2 - 100 && x < W/2 + 100) {
      state = 'select';
    }
    // Back
    if (y > H - 60) {
      window.location.href = '../index.html';
    }
    return;
  }

  if (state === 'select') {
    // Level buttons
    const cols = 5;
    const bw = 110, bh = 100, gap = 15;
    const startX = (W - cols * (bw + gap) + gap) / 2;
    const startY = 100;

    for (let i = 0; i < 20; i++) {
      let col = i % cols;
      let row = Math.floor(i / cols);
      let bx = startX + col * (bw + gap);
      let by = startY + row * (bh + gap);
      if (x >= bx && x <= bx + bw && y >= by && y <= by + bh && saveData.unlocked[i]) {
        loadLevel(i);
        return;
      }
    }
    // Back
    if (y > H - 50) state = 'title';
    return;
  }

  if (state === 'play') {
    if (completeTimer >= 0.1) {
      // Next level button
      if (y > H/2 + 45 && y < H/2 + 95 && x > W/2 - 150 && x < W/2 + 150) {
        if (currentLevel < 19) loadLevel(currentLevel + 1);
        else state = 'select';
        return;
      }
      // Level select button
      if (y > H/2 + 95 && y < H/2 + 135) {
        state = 'select'; return;
      }
      return;
    }

    // Mobile arrow buttons
    let up = {x: ctrlCX - btnSize/2, y: ctrlCY - btnSize - btnPad, w: btnSize, h: btnSize};
    let down = {x: ctrlCX - btnSize/2, y: ctrlCY + btnPad, w: btnSize, h: btnSize};
    let left = {x: ctrlCX - btnSize - btnPad, y: ctrlCY - btnSize/2, w: btnSize, h: btnSize};
    let right = {x: ctrlCX + btnPad, y: ctrlCY - btnSize/2, w: btnSize, h: btnSize};

    if (x >= up.x && x <= up.x + up.w && y >= up.y && y <= up.y + up.h) { tryMove(0, -1); return; }
    if (x >= down.x && x <= down.x + down.w && y >= down.y && y <= down.y + down.h) { tryMove(0, 1); return; }
    if (x >= left.x && x <= left.x + left.w && y >= left.y && y <= left.y + left.h) { tryMove(-1, 0); return; }
    if (x >= right.x && x <= right.x + right.w && y >= right.y && y <= right.y + right.h) { tryMove(1, 0); return; }

    // Undo button
    if (x >= 20 && x <= 90 && y >= ctrlCY - 20 && y <= ctrlCY + 16) { undo(); return; }
    // Reset button
    if (x >= W - 90 && x <= W - 20 && y >= ctrlCY - 20 && y <= ctrlCY + 16) { resetLevel(); return; }

    // Top bar buttons
    if (y < 80) {
      if (x > W - 160 && x < W - 100 && y < 50) { undo(); return; }
      if (x > W - 160 && x < W - 100 && y >= 50) { resetLevel(); return; }
      if (x > W - 100) { state = 'select'; return; }
    }
  }
}

// ---- RESIZE ----
function resize() {
  let aspect = W / H;
  let ww = window.innerWidth, wh = window.innerHeight;
  if (ww / wh > aspect) {
    C.style.height = wh + 'px';
    C.style.width = (wh * aspect) + 'px';
  } else {
    C.style.width = ww + 'px';
    C.style.height = (ww / aspect) + 'px';
  }
}
window.addEventListener('resize', resize);
resize();
</script>
