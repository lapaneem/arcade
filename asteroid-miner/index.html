<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a1a">
  <title>Asteroid Miner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0a0a1a; overflow: hidden; touch-action: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; }

    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5,5,15,0.92); z-index: 10; transition: opacity 0.3s;
      padding: 30px 16px;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay h1 {
      font-size: 44px; font-weight: 800;
      background: linear-gradient(135deg, #ffd600, #ff6d00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .overlay .subtitle { color: #667; font-size: 15px; margin-bottom: 20px; }
    .overlay .controls-info { color: #556; font-size: 13px; line-height: 2; text-align: center; margin-bottom: 20px; }
    .overlay .controls-info span { color: #ffd600; font-weight: 600; }

    .btn {
      padding: 12px 36px; border: none; border-radius: 30px; font-size: 17px; font-weight: 700;
      cursor: pointer; background: linear-gradient(135deg, #ffd600, #ff6d00); color: #000;
      letter-spacing: 2px; text-transform: uppercase;
      box-shadow: 0 0 30px rgba(255,214,0,0.3); transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,214,0,0.5); }
    .btn:active { transform: scale(0.97); }
    .btn-sm { padding: 10px 24px; font-size: 14px; letter-spacing: 1px; }
    .btn-ghost { background: rgba(255,255,255,0.08); color: #aaa; box-shadow: none; }
    .btn-ghost:hover { background: rgba(255,255,255,0.15); box-shadow: none; }

    .score-text {
      font-size: 52px; font-weight: 900;
      background: linear-gradient(135deg, #ffd600, #ff6d00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    .best-text { font-size: 18px; color: #667; font-weight: 600; margin-bottom: 8px; }
    .stats-text { font-size: 14px; color: #556; margin-bottom: 24px; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .back-btn {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(10,10,30,0.7);
      color: #888; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    }
    .back-btn:hover { background: rgba(30,30,60,0.9); color: #fff; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 5;
      pointer-events: none; padding: 12px 16px;
      display: none;
    }
    #hud.active { display: flex; justify-content: space-between; align-items: flex-start; }
    #hud-left { text-align: left; }
    #hud-center { text-align: center; flex: 1; }
    #hud-right { text-align: right; }
    .hud-score {
      font-size: 28px; font-weight: 900; color: #ffd600;
      text-shadow: 0 0 12px rgba(255,214,0,0.5);
    }
    .hud-wave { font-size: 13px; color: rgba(255,214,0,0.4); }
    .hud-crystals { font-size: 16px; font-weight: 700; color: #ffd600; }
    .hud-best { font-size: 12px; color: rgba(255,214,0,0.3); margin-top: 2px; }
    .hud-hp { font-size: 16px; font-weight: 700; margin-top: 4px; color: #ff6d00; }
    #shop-btn {
      position: fixed; bottom: 16px; right: 16px; z-index: 15;
      padding: 8px 18px; border: 2px solid rgba(255,214,0,0.4); border-radius: 20px;
      background: rgba(10,10,30,0.8); color: #ffd600; font-size: 13px; font-weight: 700;
      cursor: pointer; display: none; letter-spacing: 1px; text-transform: uppercase;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      transition: transform 0.15s, border-color 0.2s;
    }
    #shop-btn:hover { transform: scale(1.05); border-color: rgba(255,214,0,0.7); }
    #shop-btn.active { display: block; }

    .upgrade-bar {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; max-width: 420px;
    }
    .upgrade-item {
      padding: 10px 14px; border-radius: 12px; font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,0.06); color: #ccc; border: 2px solid rgba(255,255,255,0.08);
      text-align: center; min-width: 90px; cursor: default; transition: transform 0.15s, border-color 0.2s;
    }
    .upgrade-item.buyable { cursor: pointer; border-color: rgba(255,214,0,0.4); }
    .upgrade-item.buyable:hover { transform: scale(1.05); border-color: rgba(255,214,0,0.7); }
    .upgrade-item .up-name { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; color: #ffd600; }
    .upgrade-item .up-desc { font-size: 11px; color: #888; margin-bottom: 4px; }
    .upgrade-item .up-cost { color: #ffd600; font-weight: 700; }

    #damage-flash {
      position: fixed; inset: 0; background: rgba(255,0,0,0.3);
      pointer-events: none; z-index: 4; opacity: 0; transition: opacity 0.1s;
    }
  </style>
</head>
<body>

<a href="../index.html" class="back-btn">&#8592;</a>
<div id="damage-flash"></div>

<div id="hud">
  <div id="hud-left">
    <div id="hud-hp-display" class="hud-hp"></div>
  </div>
  <div id="hud-center">
    <div class="hud-score" id="hud-score">0</div>
    <div class="hud-wave" id="hud-wave">Wave 1</div>
  </div>
  <div id="hud-right">
    <div class="hud-crystals" id="hud-crystals">0 crystals</div>
    <div class="hud-best" id="hud-best">Best: 0</div>
  </div>
</div>

<div class="overlay" id="start-screen">
  <h1>Asteroid Miner</h1>
  <div class="subtitle">Shoot asteroids. Collect crystals. Survive.</div>
  <div class="controls-info" id="controls-info">
    <span>WASD</span> to move &bull; <span>Mouse</span> to aim<br>
    Auto-fires <span>lasers</span> at cursor<br>
    <span>Touch</span> to move and aim
  </div>
  <button class="btn" id="play-btn">PLAY</button>
</div>

<div class="overlay hidden" id="game-over">
  <h1>DESTROYED</h1>
  <div class="score-text" id="final-score">0</div>
  <div class="best-text" id="best-score">Best: 0</div>
  <div class="stats-text" id="stats-text"></div>
  <div class="btn-row">
    <button class="btn btn-sm" id="retry-btn">RETRY</button>
    <button class="btn btn-sm btn-ghost" id="menu-btn">MENU</button>
  </div>
</div>

<button id="shop-btn">Shop</button>

<div class="overlay hidden" id="upgrade-screen">
  <h1 style="font-size:32px;">Upgrades</h1>
  <div class="subtitle" id="upgrade-crystals">Crystals: 0</div>
  <div class="upgrade-bar" id="upgrade-bar"></div>
  <button class="btn btn-sm" id="continue-btn">Continue</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// ASTEROID MINER — Simplified Top-Down (Three.js r128)
// ============================================================

// --- Three.js Setup ---
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a1a);
renderer.shadowMap.enabled = false;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0008);

// Top-down camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 20, -10);
scene.add(dirLight);
const hemiLight = new THREE.HemisphereLight(0x443366, 0x222244, 0.4);
scene.add(hemiLight);

// --- Starfield ---
(function createStarfield() {
  const starGeo = new THREE.BufferGeometry();
  const starCount = 3000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 1600;
    positions[i*3+1] = -20 - Math.random() * 200;
    positions[i*3+2] = (Math.random() - 0.5) * 1600;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));
})();

// --- Materials (shared) ---
const matGold = new THREE.MeshStandardMaterial({ color: 0xffd600, emissive: 0xffd600, emissiveIntensity: 0.3, metalness: 0.8, roughness: 0.3 });
const matOrange = new THREE.MeshStandardMaterial({ color: 0xff6d00, emissive: 0xff6d00, emissiveIntensity: 0.2 });
const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 });
const matLaser = new THREE.MeshBasicMaterial({ color: 0xff2222 });
const matCrystal = new THREE.MeshStandardMaterial({ color: 0xffd600, emissive: 0xffd600, emissiveIntensity: 0.6, metalness: 1.0, roughness: 0.1, transparent: true, opacity: 0.85 });

// --- Build Ship Mesh ---
function createShipMesh() {
  const group = new THREE.Group();

  // Main fuselage
  const bodyGeo = new THREE.ConeGeometry(0.8, 4, 4);
  bodyGeo.rotateX(Math.PI / 2);
  const body = new THREE.Mesh(bodyGeo, matGold);
  body.position.z = 0.5;
  group.add(body);

  // Cockpit
  const cockpitGeo = new THREE.SphereGeometry(0.45, 8, 6);
  const cockpit = new THREE.Mesh(cockpitGeo, matWhite);
  cockpit.position.set(0, 0.3, 1.2);
  cockpit.scale.set(1, 0.6, 1.2);
  group.add(cockpit);

  // Wings
  const wingGeo = new THREE.BoxGeometry(3.5, 0.1, 1.8);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff6d00, emissiveIntensity: 0.15, metalness: 0.5, roughness: 0.4 });
  const leftWing = new THREE.Mesh(wingGeo, wingMat);
  leftWing.position.set(-1.6, 0, -0.3);
  leftWing.rotation.z = -0.1;
  leftWing.rotation.y = 0.15;
  group.add(leftWing);
  const rightWing = new THREE.Mesh(wingGeo, wingMat);
  rightWing.position.set(1.6, 0, -0.3);
  rightWing.rotation.z = 0.1;
  rightWing.rotation.y = -0.15;
  group.add(rightWing);

  // Wing tips
  const tipGeo = new THREE.ConeGeometry(0.2, 0.8, 4);
  tipGeo.rotateX(-Math.PI / 2);
  const leftTip = new THREE.Mesh(tipGeo, matGold);
  leftTip.position.set(-3.2, 0, -0.5);
  group.add(leftTip);
  const rightTip = new THREE.Mesh(tipGeo, matGold);
  rightTip.position.set(3.2, 0, -0.5);
  group.add(rightTip);

  // Engine block
  const engineGeo = new THREE.CylinderGeometry(0.35, 0.5, 1.0, 6);
  engineGeo.rotateX(Math.PI / 2);
  const engineMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.3 });
  const engineL = new THREE.Mesh(engineGeo, engineMat);
  engineL.position.set(-0.6, -0.05, -1.8);
  group.add(engineL);
  const engineR = new THREE.Mesh(engineGeo, engineMat);
  engineR.position.set(0.6, -0.05, -1.8);
  group.add(engineR);

  // Engine glow
  const engineGlowLight = new THREE.PointLight(0xff6d00, 2, 8);
  engineGlowLight.position.set(0, 0, -2.5);
  group.add(engineGlowLight);

  // Engine glow mesh
  const glowGeo = new THREE.SphereGeometry(0.3, 8, 6);
  const glowMatL = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8 });
  const glowMeshL = new THREE.Mesh(glowGeo, glowMatL);
  glowMeshL.position.set(-0.6, -0.05, -2.2);
  group.add(glowMeshL);
  const glowMeshR = new THREE.Mesh(glowGeo, glowMatL.clone());
  glowMeshR.position.set(0.6, -0.05, -2.2);
  group.add(glowMeshR);

  group.engineGlowLight = engineGlowLight;
  group.glowMeshL = glowMeshL;
  group.glowMeshR = glowMeshR;

  return group;
}

const shipMesh = createShipMesh();
scene.add(shipMesh);

// --- Create Asteroid Mesh (all same style: brownish rock) ---
function createAsteroidMesh(radius) {
  const geo = new THREE.DodecahedronGeometry(radius, 0);

  // Randomize vertices for rocky look
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z);
    const scale = 0.75 + Math.random() * 0.5;
    pos.setXYZ(i, x/len * radius * scale, y/len * radius * scale, z/len * radius * scale);
  }
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color: 0x6b5b42,
    emissive: 0x3a3020,
    emissiveIntensity: 0.1,
    roughness: 0.85,
    metalness: 0.1,
    flatShading: true,
  });

  const mesh = new THREE.Mesh(geo, mat);
  return mesh;
}

// --- Create Crystal Mesh ---
function createCrystalMesh() {
  const geo = new THREE.OctahedronGeometry(0.5, 0);
  const mesh = new THREE.Mesh(geo, matCrystal.clone());
  const glow = new THREE.PointLight(0xffd600, 0.6, 5);
  mesh.add(glow);
  return mesh;
}

// --- Create Laser Mesh ---
function createLaserMesh() {
  const geo = new THREE.CylinderGeometry(0.08, 0.08, 2.5, 4);
  geo.rotateX(Math.PI / 2);
  const mesh = new THREE.Mesh(geo, matLaser.clone());
  const glow = new THREE.PointLight(0xff2222, 0.8, 4);
  mesh.add(glow);
  return mesh;
}

// --- Create Explosion Particle ---
function createParticleMesh(color, size) {
  const geo = new THREE.SphereGeometry(size, 4, 3);
  const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
  return new THREE.Mesh(geo, mat);
}

// ============================================================
// GAME STATE
// ============================================================
let gameRunning = false, dead = false;
let score = 0, crystals = 0;
let bestScore = +(localStorage.getItem('asteroid-miner-best') || 0);
let frameCount = 0, wave = 1, asteroidsMined = 0;

let hp = 3;
let maxHP = 3;
let laserCooldown = 0;
let laserFireRate = 10;
let shipSpeed = 5;
let magnetRange = 0;
let damageFlashTimer = 0;
let screenShake = 0;
let invincibleTimer = 0;

// Ship state
const ship = { x: 0, z: 0, vx: 0, vz: 0, angle: 0, r: 2 };

// Game arrays
let asteroids = [];
let crystalItems = [];
let particles = [];
let lasers = [];

// Field bounds
const FIELD_W = 120;
const FIELD_H = 80;

const keys = {};
let mouseWorld = { x: 0, z: 0 };
let mouseScreenX = window.innerWidth / 2;
let mouseScreenY = window.innerHeight / 2;
let isTouching = false;
let touchMoveTarget = null;

// --- Input ---
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mouse tracking (always track for aiming)
renderer.domElement.addEventListener('mousemove', e => {
  mouseScreenX = e.clientX;
  mouseScreenY = e.clientY;
});

// Touch: touch position drives both movement and aiming
renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  isTouching = true;
  const t = e.touches[0];
  touchMoveTarget = { x: t.clientX, y: t.clientY };
  mouseScreenX = t.clientX;
  mouseScreenY = t.clientY;
}, { passive: false });
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchMoveTarget = { x: t.clientX, y: t.clientY };
  mouseScreenX = t.clientX;
  mouseScreenY = t.clientY;
}, { passive: false });
renderer.domElement.addEventListener('touchend', e => {
  e.preventDefault();
  isTouching = false;
  touchMoveTarget = null;
}, { passive: false });

// --- Buttons ---
document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('menu-btn').addEventListener('click', showMenu);

document.getElementById('continue-btn').addEventListener('click', () => {
  document.getElementById('upgrade-screen').classList.add('hidden');
  gameRunning = true;
  // Only spawn wave if no asteroids left (came from wave clear)
  if (asteroids.length === 0) spawnWave();
});
document.getElementById('shop-btn').addEventListener('click', () => {
  if (gameRunning) showUpgrades();
});

function showMenu() {
  gameRunning = false; dead = false;
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('game-over').classList.add('hidden');
  document.getElementById('upgrade-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('shop-btn').classList.remove('active');
}

function startGame() {
  score = 0; crystals = 0; frameCount = 0; wave = 1; asteroidsMined = 0;
  ship.x = 0; ship.z = 0; ship.vx = 0; ship.vz = 0; ship.angle = 0;
  dead = false; gameRunning = true; screenShake = 0; damageFlashTimer = 0;
  maxHP = 3; hp = maxHP;
  laserCooldown = 0; laserFireRate = 10;
  shipSpeed = 5; magnetRange = 8;
  invincibleTimer = 0;

  // Clear old objects
  for (const a of asteroids) scene.remove(a.mesh);
  for (const c of crystalItems) scene.remove(c.mesh);
  for (const p of particles) scene.remove(p.mesh);
  for (const l of lasers) scene.remove(l.mesh);
  asteroids = []; crystalItems = []; particles = []; lasers = [];

  shipMesh.visible = true;
  spawnWave();

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over').classList.add('hidden');
  document.getElementById('upgrade-screen').classList.add('hidden');
  document.getElementById('hud').classList.add('active');
  document.getElementById('shop-btn').classList.add('active');
  updateHUD();
}

// --- HUD ---
function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-wave').textContent = 'Wave ' + wave;
  document.getElementById('hud-crystals').textContent = crystals + ' crystals';
  document.getElementById('hud-best').textContent = 'Best: ' + bestScore;
  const hpEl = document.getElementById('hud-hp-display');
  let hpTxt = 'HP: ';
  for (let i = 0; i < maxHP; i++) hpTxt += i < hp ? '\u2764' : '\u2661';
  hpEl.textContent = hpTxt;
  hpEl.style.color = hp > 1 ? '#ff6d00' : '#ff2222';
}

// --- Spawn Wave ---
function spawnWave() {
  const count = 5 + wave * 3;
  for (let i = 0; i < count; i++) spawnAsteroid();
}

function spawnAsteroid() {
  const side = Math.floor(Math.random() * 4);
  let x, z;
  const hw = FIELD_W / 2 + 20, hh = FIELD_H / 2 + 20;
  if (side === 0) { x = -hw; z = (Math.random() - 0.5) * FIELD_H; }
  else if (side === 1) { x = hw; z = (Math.random() - 0.5) * FIELD_H; }
  else if (side === 2) { x = (Math.random() - 0.5) * FIELD_W; z = -hh; }
  else { x = (Math.random() - 0.5) * FIELD_W; z = hh; }

  const diff = Math.min(wave / 10, 1);
  const r = 1.5 + Math.random() * 1.0;
  const speed = 0.03 + Math.random() * 0.06 + diff * 0.03;

  const angle = Math.atan2(-z + (Math.random()-0.5)*FIELD_H*0.6, -x + (Math.random()-0.5)*FIELD_W*0.6);

  const mesh = createAsteroidMesh(r);
  mesh.position.set(x, 0, z);
  mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  scene.add(mesh);

  asteroids.push({
    mesh, x, z,
    vx: Math.cos(angle) * speed,
    vz: Math.sin(angle) * speed,
    r,
    hp: 1,
    spinX: (Math.random() - 0.5) * 0.02,
    spinY: (Math.random() - 0.5) * 0.02,
    spinZ: (Math.random() - 0.5) * 0.02,
    crystalValue: Math.ceil(Math.random() * 3),
  });
}

// --- Crystal Spawn ---
function spawnCrystal(x, z, value) {
  for (let i = 0; i < value; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 0.03 + Math.random() * 0.08;
    const mesh = createCrystalMesh();
    mesh.position.set(x, 0, z);
    mesh.scale.setScalar(1.5 + Math.random() * 0.5);
    scene.add(mesh);
    crystalItems.push({
      mesh, x, z,
      vx: Math.cos(a) * sp,
      vz: Math.sin(a) * sp,
      life: 300 + Math.random() * 200,
      spinSpeed: 0.03 + Math.random() * 0.05,
    });
  }
}

// --- Explosion ---
function spawnExplosion(x, z, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const elev = (Math.random() - 0.5) * 2;
    const sp = 0.1 + Math.random() * 0.2;
    const size = 0.1 + Math.random() * 0.25;
    const mesh = createParticleMesh(color, size);
    mesh.position.set(x, elev, z);
    scene.add(mesh);
    particles.push({
      mesh, x, y: elev, z,
      vx: Math.cos(a) * sp,
      vy: (Math.random() - 0.5) * 0.1,
      vz: Math.sin(a) * sp,
      life: 20 + Math.random() * 25,
      maxLife: 45,
    });
  }
}

// --- Engine Particles ---
function spawnEngineParticle() {
  const a = ship.angle + Math.PI + (Math.random()-0.5)*0.5;
  const px = ship.x - Math.sin(ship.angle) * 2.2 + (Math.random()-0.5)*0.5;
  const pz = ship.z - Math.cos(ship.angle) * 2.2 + (Math.random()-0.5)*0.5;
  const sp = 0.08 + Math.random() * 0.06;
  const mesh = createParticleMesh(0xff6d00, 0.12 + Math.random() * 0.15);
  mesh.position.set(px, (Math.random()-0.5)*0.3, pz);
  scene.add(mesh);
  particles.push({
    mesh, x: px, y: (Math.random()-0.5)*0.3, z: pz,
    vx: Math.sin(a) * sp + ship.vx * 0.3,
    vy: (Math.random()-0.5)*0.02,
    vz: Math.cos(a) * sp + ship.vz * 0.3,
    life: 8 + Math.random()*8, maxLife: 16,
  });
}

// --- Laser Fire (aims toward mouse/touch) ---
function fireLaser() {
  if (laserCooldown > 0) return;
  laserCooldown = laserFireRate;

  const sinA = Math.sin(ship.angle);
  const cosA = Math.cos(ship.angle);

  const offsets = [-0.6, 0.6];
  for (const ox of offsets) {
    const sx = ship.x + sinA * 2 + cosA * ox;
    const sz = ship.z + cosA * 2 - sinA * ox;
    const mesh = createLaserMesh();
    mesh.position.set(sx, 0, sz);
    mesh.rotation.y = ship.angle;
    scene.add(mesh);
    lasers.push({
      mesh,
      x: sx, z: sz,
      vx: sinA * 0.8,
      vz: cosA * 0.8,
      life: 50,
    });
  }
}

// --- Die ---
function die() {
  dead = true; gameRunning = false; screenShake = 20;
  document.getElementById('shop-btn').classList.remove('active');
  spawnExplosion(ship.x, ship.z, 0xffd600, 30);
  spawnExplosion(ship.x, ship.z, 0xff6d00, 20);
  shipMesh.visible = false;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('asteroid-miner-best', bestScore);
  }
  setTimeout(() => {
    document.getElementById('final-score').textContent = score;
    document.getElementById('best-score').textContent = 'Best: ' + bestScore;
    document.getElementById('stats-text').textContent = 'Wave ' + wave + ' | ' + asteroidsMined + ' asteroids mined | ' + crystals + ' crystals';
    document.getElementById('game-over').classList.remove('hidden');
  }, 800);
}

// --- Unproject mouse to world XZ plane ---
function screenToWorld(sx, sy) {
  const ndc = new THREE.Vector2(
    (sx / window.innerWidth) * 2 - 1,
    -(sy / window.innerHeight) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(ndc, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, target);
  return target;
}

// --- Show Upgrades ---
function showUpgrades() {
  gameRunning = false;
  document.getElementById('upgrade-crystals').textContent = 'Crystals: ' + crystals;
  const bar = document.getElementById('upgrade-bar');
  bar.innerHTML = '';

  const upgrades = [
    { name: 'Rapid Fire', desc: 'Shoot faster', cost: 5, action: () => { if (laserFireRate > 3) laserFireRate -= 2; } },
    { name: 'Extra HP', desc: '+1 max health', cost: 8, action: () => { maxHP++; hp = maxHP; } },
    { name: 'Speed', desc: 'Move faster', cost: 5, action: () => { shipSpeed += 1; } },
    { name: 'Magnet', desc: 'Pull crystals to you', cost: 6, action: () => { magnetRange += 10; } },
  ];

  upgrades.forEach(up => {
    const el = document.createElement('div');
    const canBuy = crystals >= up.cost;
    el.className = 'upgrade-item' + (canBuy ? ' buyable' : '');
    el.innerHTML = '<div class="up-name">' + up.name + '</div><div class="up-desc">' + up.desc + '</div><div class="up-cost">' + up.cost + ' crystals</div>';
    if (canBuy) {
      el.addEventListener('click', () => {
        crystals -= up.cost;
        up.action();
        showUpgrades(); // refresh
      });
    }
    bar.appendChild(el);
  });

  document.getElementById('upgrade-screen').classList.remove('hidden');
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  if (!gameRunning) return;
  frameCount++;

  // --- Mouse/touch -> world for aiming ---
  const worldAim = screenToWorld(mouseScreenX, mouseScreenY);
  if (worldAim) {
    mouseWorld.x = worldAim.x;
    mouseWorld.z = worldAim.z;
  }

  // --- Ship faces mouse/touch ---
  const aimDx = mouseWorld.x - ship.x;
  const aimDz = mouseWorld.z - ship.z;
  const aimDist = Math.sqrt(aimDx * aimDx + aimDz * aimDz);
  if (aimDist > 0.5) {
    ship.angle = Math.atan2(aimDx, aimDz);
  }

  // --- Movement Input ---
  let ax = 0, az = 0;
  if (keys['w'] || keys['W'] || keys['ArrowUp']) az += 1;
  if (keys['s'] || keys['S'] || keys['ArrowDown']) az -= 1;
  if (keys['a'] || keys['A'] || keys['ArrowLeft']) ax -= 1;
  if (keys['d'] || keys['D'] || keys['ArrowRight']) ax += 1;

  // Touch: move toward touch position
  if (isTouching && touchMoveTarget) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const dx = touchMoveTarget.x - cx;
    const dy = -(touchMoveTarget.y - cy);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 15) {
      ax = dx / dist;
      az = dy / dist;
    }
  }

  // Auto-fire lasers
  fireLaser();

  // Ship movement with inertia
  const len = Math.sqrt(ax*ax + az*az);
  if (len > 0) {
    ax /= len; az /= len;
    ship.vx += ax * 0.012;
    ship.vz += az * 0.012;
    if (frameCount % 3 === 0) spawnEngineParticle();
  }

  ship.vx *= 0.96;
  ship.vz *= 0.96;
  const spd = Math.sqrt(ship.vx*ship.vx + ship.vz*ship.vz);
  const maxSpd = shipSpeed * 0.04;
  if (spd > maxSpd) {
    ship.vx = ship.vx / spd * maxSpd;
    ship.vz = ship.vz / spd * maxSpd;
  }

  ship.x += ship.vx;
  ship.z += ship.vz;

  // Wrap around field
  const hw = FIELD_W / 2, hh = FIELD_H / 2;
  if (ship.x < -hw - 3) ship.x = hw + 3;
  if (ship.x > hw + 3) ship.x = -hw - 3;
  if (ship.z < -hh - 3) ship.z = hh + 3;
  if (ship.z > hh + 3) ship.z = -hh - 3;

  // Update ship mesh
  shipMesh.position.set(ship.x, 0, ship.z);
  shipMesh.rotation.y = ship.angle;
  shipMesh.rotation.z = 0;
  shipMesh.rotation.x = 0;

  // Engine glow intensity based on speed
  const glowIntensity = 0.5 + (spd / maxSpd) * 3;
  shipMesh.engineGlowLight.intensity = glowIntensity;
  const glowScale = 0.5 + (spd / maxSpd) * 1.0;
  shipMesh.glowMeshL.scale.setScalar(glowScale);
  shipMesh.glowMeshR.scale.setScalar(glowScale);

  // Invincibility timer (after taking damage)
  if (invincibleTimer > 0) {
    invincibleTimer--;
    // Blink ship
    shipMesh.visible = Math.floor(invincibleTimer / 4) % 2 === 0;
  } else {
    shipMesh.visible = true;
  }

  // --- Asteroids ---
  for (const a of asteroids) {
    a.x += a.vx; a.z += a.vz;
    a.mesh.position.set(a.x, 0, a.z);
    a.mesh.rotation.x += a.spinX;
    a.mesh.rotation.y += a.spinY;
    a.mesh.rotation.z += a.spinZ;
    // Wrap
    if (a.x < -hw - 15) a.x = hw + 15;
    if (a.x > hw + 15) a.x = -hw - 15;
    if (a.z < -hh - 15) a.z = hh + 15;
    if (a.z > hh + 15) a.z = -hh - 15;
  }

  // --- Lasers ---
  if (laserCooldown > 0) laserCooldown--;
  for (const l of lasers) {
    l.x += l.vx; l.z += l.vz;
    l.mesh.position.set(l.x, 0, l.z);
    l.life--;
  }
  lasers = lasers.filter(l => {
    if (l.life <= 0 || Math.abs(l.x) > hw + 20 || Math.abs(l.z) > hh + 20) {
      scene.remove(l.mesh);
      return false;
    }
    return true;
  });

  // --- Laser-Asteroid Collision ---
  for (const l of lasers) {
    for (let i = asteroids.length - 1; i >= 0; i--) {
      const a = asteroids[i];
      const dx = l.x - a.x, dz = l.z - a.z;
      if (dx*dx + dz*dz < a.r * a.r) {
        a.hp--;
        l.life = 0;
        spawnExplosion(l.x, l.z, 0xffd600, 5);
        if (a.hp <= 0) {
          spawnExplosion(a.x, a.z, 0xa0926b, 15);
          if (a.crystalValue > 0) spawnCrystal(a.x, a.z, a.crystalValue);
          crystals++;
          score += 10;
          asteroidsMined++;
          scene.remove(a.mesh);
          asteroids.splice(i, 1);
        }
        break;
      }
    }
  }

  // --- Ship-Asteroid Collision ---
  if (invincibleTimer <= 0) {
    for (let i = asteroids.length - 1; i >= 0; i--) {
      const a = asteroids[i];
      const dx = ship.x - a.x, dz = ship.z - a.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < ship.r + a.r * 0.8) {
        hp--;
        damageFlashTimer = 15;
        screenShake = 10;
        invincibleTimer = 60; // ~1 second invincibility

        // Bounce
        const nx = dx/dist, nz = dz/dist;
        ship.vx = nx * 0.15; ship.vz = nz * 0.15;
        a.vx = -nx * 0.08; a.vz = -nz * 0.08;

        spawnExplosion(ship.x, ship.z, 0xff6d00, 10);

        if (hp <= 0) {
          die(); return;
        }
        break;
      }
    }
  }

  // --- Crystal Pickup ---
  for (let i = crystalItems.length - 1; i >= 0; i--) {
    const c = crystalItems[i];
    c.x += c.vx; c.z += c.vz;
    c.vx *= 0.97; c.vz *= 0.97;
    c.life--;

    // Float and spin
    c.mesh.position.set(c.x, 0.5 + Math.sin(frameCount * 0.05 + i) * 0.3, c.z);
    c.mesh.rotation.y += c.spinSpeed;
    c.mesh.rotation.x += c.spinSpeed * 0.7;

    // Fade out
    if (c.life < 60) {
      c.mesh.material.opacity = (c.life / 60) * 0.85;
    }

    // Magnet pull
    if (magnetRange > 0) {
      const mdx = ship.x - c.x, mdz = ship.z - c.z;
      const mdist = Math.sqrt(mdx*mdx + mdz*mdz);
      if (mdist < magnetRange && mdist > 0) {
        const force = (1 - mdist / magnetRange) * 0.02;
        c.vx += (mdx / mdist) * force;
        c.vz += (mdz / mdist) * force;
      }
    }

    // Pickup
    const dx = ship.x - c.x, dz = ship.z - c.z;
    if (dx*dx + dz*dz < (ship.r + 3) * (ship.r + 3)) {
      crystals++;
      score += 5;
      spawnExplosion(c.x, c.z, 0xffd600, 4);
      scene.remove(c.mesh);
      crystalItems.splice(i, 1);
      continue;
    }

    if (c.life <= 0) {
      scene.remove(c.mesh);
      crystalItems.splice(i, 1);
    }
  }

  // --- Particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vx *= 0.96; p.vy *= 0.96; p.vz *= 0.96;
    p.life--;
    p.mesh.position.set(p.x, p.y, p.z);
    const ratio = p.life / p.maxLife;
    p.mesh.material.opacity = ratio;
    p.mesh.scale.setScalar(ratio);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // --- Screen shake & damage flash ---
  if (screenShake > 0) screenShake *= 0.9;
  if (screenShake < 0.1) screenShake = 0;

  if (damageFlashTimer > 0) {
    damageFlashTimer--;
    document.getElementById('damage-flash').style.opacity = damageFlashTimer / 30;
  } else {
    document.getElementById('damage-flash').style.opacity = 0;
  }

  // --- Wave check ---
  if (asteroids.length === 0) {
    wave++;
    if (wave % 3 === 1 && wave > 1) {
      showUpgrades();
    } else {
      spawnWave();
    }
  }

  // Continuous spawning
  if (asteroids.length < 3 + wave && frameCount % 60 === 0) {
    spawnAsteroid();
  }

  updateHUD();
}

// ============================================================
// CAMERA — Top-down, looking straight down
// ============================================================
const CAM_HEIGHT = 55;

function updateCamera() {
  let tx, tz;
  if (gameRunning || dead) {
    tx = ship.x;
    tz = ship.z;
  } else {
    // Idle slow orbit
    tx = Math.cos(Date.now() * 0.0003) * 10;
    tz = Math.sin(Date.now() * 0.0003) * 10;
  }

  const targetPos = new THREE.Vector3(tx, CAM_HEIGHT, tz);

  // Screen shake
  if (screenShake > 0) {
    targetPos.x += (Math.random() - 0.5) * screenShake * 0.3;
    targetPos.z += (Math.random() - 0.5) * screenShake * 0.3;
  }

  camera.position.lerp(targetPos, 0.08);
  camera.lookAt(camera.position.x, 0, camera.position.z);
}

// ============================================================
// IDLE SCENE
// ============================================================
let idleAsteroids = [];

function setupIdle() {
  for (let i = 0; i < 8; i++) {
    const r = 1.5 + Math.random() * 1.0;
    const mesh = createAsteroidMesh(r);
    const angle = (i / 8) * Math.PI * 2;
    const dist = 15 + Math.random() * 20;
    mesh.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    scene.add(mesh);
    idleAsteroids.push({
      mesh,
      angle,
      dist,
      speed: 0.001 + Math.random() * 0.002,
      spinX: (Math.random()-0.5)*0.01,
      spinY: (Math.random()-0.5)*0.01,
    });
  }
}

function updateIdle() {
  for (const a of idleAsteroids) {
    a.angle += a.speed;
    a.mesh.position.x = Math.cos(a.angle) * a.dist;
    a.mesh.position.z = Math.sin(a.angle) * a.dist;
    a.mesh.rotation.x += a.spinX;
    a.mesh.rotation.y += a.spinY;
  }
  // Idle ship animation
  const t = Date.now() * 0.001;
  shipMesh.position.set(Math.cos(t * 0.5) * 3, 0, Math.sin(t * 0.3) * 3);
  shipMesh.rotation.y = t * 0.3;
  shipMesh.rotation.z = 0;
  shipMesh.rotation.x = 0;
  shipMesh.visible = true;
}

function cleanupIdle() {
  for (const a of idleAsteroids) scene.remove(a.mesh);
  idleAsteroids = [];
}

setupIdle();

// ============================================================
// MAIN LOOP
// ============================================================
let wasGameActive = false;

function animate() {
  requestAnimationFrame(animate);

  const isActive = gameRunning || dead;

  if (isActive && !wasGameActive) {
    cleanupIdle();
  } else if (!isActive && !dead && wasGameActive) {
    setupIdle();
  }
  wasGameActive = isActive;

  if (isActive) {
    update();
  } else {
    updateIdle();
    // Still update lingering particles from death
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.z += p.vz;
      p.vx *= 0.96; p.vy *= 0.96; p.vz *= 0.96;
      p.life--;
      p.mesh.position.set(p.x, p.y, p.z);
      const ratio = Math.max(0, p.life / p.maxLife);
      p.mesh.material.opacity = ratio;
      p.mesh.scale.setScalar(ratio);
      if (p.life <= 0) {
        scene.remove(p.mesh);
        particles.splice(i, 1);
      }
    }
  }

  updateCamera();
  renderer.render(scene, camera);
}

animate();

// Show best score on load
document.getElementById('hud-best').textContent = 'Best: ' + bestScore;
</script>
